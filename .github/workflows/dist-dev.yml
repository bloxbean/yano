name: Dev Distribution Build

on:
  push:
    tags:
      - 'dev-*'
  workflow_dispatch:

jobs:
  jar-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build uber-jar distribution
        run: ./gradlew :app:yanoDistZip -PskipSigning=true
      - name: Upload JAR distribution
        uses: actions/upload-artifact@v4
        with:
          name: jar-dist
          path: app/build/distributions/yano-*.zip
          retention-days: 3

  native-dist:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
          - os: ubuntu-22.04-arm
            label: linux-arm64
          - os: macos-14
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build native binary
        run: ./gradlew :app:quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -PskipSigning=true
      - name: Package native distribution
        run: ./gradlew :app:yanoNativeDistZip -PskipSigning=true
      - name: Upload native distribution
        uses: actions/upload-artifact@v4
        with:
          name: native-dist-${{ matrix.label }}
          path: app/build/distributions/yano-native-*.zip
          retention-days: 3
