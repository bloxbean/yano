name: Publish package to the Maven Central Repository
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Read project version
        id: version
        run: |
          VERSION=$(./gradlew -q properties | awk '/^version:/ { print $2; exit }')
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match Gradle version ${VERSION}" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-SNAPSHOT* ]]; then
            echo "Release tags require a non-SNAPSHOT version. Got: $VERSION" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build with Gradle
        run: ./gradlew clean build
      - name: Decode GPG Key
        run: |
          mkdir -p ~/.gradle/
          echo "${{secrets.SIGNING_KEY}}" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg
      - name: Publish package
        run: ./gradlew publishToSonatype closeSonatypeStagingRepository  -Psigning.keyId=${{ secrets.SIGNING_KEY_ID }} -Psigning.password=${{ secrets.SIGNING_PASSWORD }} -Psigning.secretKeyRingFile=$(echo ~/.gradle/secring.gpg) --warn --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
  docker-release:
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/release-docker.yml
    with:
      version: ${{ needs.publish.outputs.version }}
      git_tag: ${{ github.ref_name }}
    secrets: inherit
