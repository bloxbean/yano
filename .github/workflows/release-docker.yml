name: Release Docker Images

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      git_tag:
        required: true
        type: string
      promote_latest:
        required: false
        type: boolean
        default: false
      dry_run:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Staged Maven version to release as Docker images
        required: true
        type: string
      git_tag:
        description: Git ref for dry run, or GitHub release tag for publishing
        required: true
        type: string
      promote_latest:
        description: Allow manual dispatch to move latest-jvm/latest-native for a final release
        required: false
        type: boolean
        default: false
      dry_run:
        description: Build and validate without pushing DockerHub images or uploading the compose zip
        required: false
        type: boolean
        default: true
      maven_staging_confirmed:
        description: Required for manual publishing; confirms Maven staging was closed by release.yml
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-docker-${{ inputs.git_tag || github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: bloxbean/yano
  JVM_BASE_IMAGE: eclipse-temurin:25-jre

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      is_final: ${{ steps.validate.outputs.is_final }}
      promote_latest: ${{ steps.validate.outputs.promote_latest }}
      dry_run: ${{ steps.validate.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_tag }}
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate release inputs
        id: validate
        shell: bash
        env:
          HAS_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          HAS_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_GIT_TAG: ${{ inputs.git_tag }}
          INPUT_PROMOTE_LATEST: ${{ inputs.promote_latest || false }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || false }}
          INPUT_MAVEN_STAGING_CONFIRMED: ${{ inputs.maven_staging_confirmed || false }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          DRY_RUN="$INPUT_DRY_RUN"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$DRY_RUN" != "true" && "$INPUT_MAVEN_STAGING_CONFIRMED" != "true" ]]; then
            echo "Manual Docker publishing requires maven_staging_confirmed=true" >&2
            exit 1
          fi

          if [[ "$DRY_RUN" != "true" && ("$HAS_DOCKERHUB_USERNAME" != "true" || "$HAS_DOCKERHUB_TOKEN" != "true") ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required" >&2
            exit 1
          fi

          VERSION="$INPUT_VERSION"
          GIT_TAG="$INPUT_GIT_TAG"
          if [[ "$DRY_RUN" != "true" && "$VERSION" == *-SNAPSHOT* ]]; then
            echo "Docker releases require a non-SNAPSHOT version. Got: $VERSION" >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Version is not safe for Docker tags: $VERSION" >&2
            exit 1
          fi

          if [[ "$DRY_RUN" != "true" && "$GIT_TAG" != "v${VERSION}" ]]; then
            echo "Git tag ${GIT_TAG} does not match version ${VERSION}" >&2
            exit 1
          fi

          GRADLE_VERSION=$(./gradlew -q properties | awk '/^version:/ { print $2; exit }')
          if [[ "$GRADLE_VERSION" != "$VERSION" ]]; then
            echo "Gradle version ${GRADLE_VERSION} at ${GIT_TAG} does not match requested Docker version ${VERSION}" >&2
            exit 1
          fi

          IS_FINAL=false
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_FINAL=true
          fi
          PROMOTE_LATEST="$IS_FINAL"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PROMOTE_LATEST=false
            if [[ "$INPUT_PROMOTE_LATEST" == "true" ]]; then
              PROMOTE_LATEST="$IS_FINAL"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_final=$IS_FINAL" >> "$GITHUB_OUTPUT"
          echo "promote_latest=$PROMOTE_LATEST" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

  jvm-image:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_tag }}
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate JVM base image
        run: docker buildx imagetools inspect "${JVM_BASE_IMAGE}" >/dev/null

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare JVM Docker context
        run: ./gradlew :app:prepareYanoDockerJvmContext -PskipSigning=true

      - name: Build local JVM smoke image
        run: docker build --build-arg JVM_BASE_IMAGE="${JVM_BASE_IMAGE}" -t yano:jvm-smoke app/build/docker/jvm/context

      - name: Smoke test JVM image
        shell: bash
        run: |
          set -euo pipefail
          CID="$(docker run -d -e YANO_AUTO_SYNC_START=false -e YANO_PROFILE=preprod yano:jvm-smoke)"
          cleanup() {
            docker logs "$CID" --tail 200 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if docker exec "$CID" curl -fsS http://localhost:7070/q/health/ready >/dev/null 2>&1; then
              docker exec "$CID" curl -fsS http://localhost:7070/q/health >/dev/null
              exit 0
            fi
            if ! docker ps -q --no-trunc | grep -q "$CID"; then
              echo "JVM container exited before becoming healthy" >&2
              exit 1
            fi
            sleep 2
          done

          echo "JVM container did not become healthy" >&2
          exit 1

      - name: Login to Docker Hub
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish JVM image
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: app/build/docker/jvm/context
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            JVM_BASE_IMAGE=${{ env.JVM_BASE_IMAGE }}
          tags: ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}-jvm

      - name: Dry-run JVM publish summary
        if: needs.validate.outputs.dry_run == 'true'
        run: |
          echo "Dry run: would publish ${IMAGE_NAME}:${{ needs.validate.outputs.version }}-jvm"

  native-image:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_tag }}
          persist-credentials: false

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare native Docker context
        run: ./gradlew :app:prepareYanoDockerNativeContext -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -PskipSigning=true

      - name: Build local native smoke image
        run: docker build -t yano:native-smoke app/build/docker/native/context

      - name: Smoke test native image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint ldd yano:native-smoke /app/yano

          CID="$(docker run -d -e YANO_AUTO_SYNC_START=false -e YANO_PROFILE=preprod yano:native-smoke)"
          cleanup() {
            docker logs "$CID" --tail 200 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if docker exec "$CID" curl -fsS http://localhost:7070/q/health/ready >/dev/null 2>&1; then
              docker exec "$CID" curl -fsS http://localhost:7070/q/health >/dev/null
              exit 0
            fi
            if ! docker ps -q --no-trunc | grep -q "$CID"; then
              echo "Native container exited before becoming healthy" >&2
              exit 1
            fi
            sleep 2
          done

          echo "Native container did not become healthy" >&2
          exit 1

      - name: Login to Docker Hub
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish native image for ${{ matrix.arch }}
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: app/build/docker/native/context
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}-native-${{ matrix.arch }}

      - name: Dry-run native publish summary
        if: needs.validate.outputs.dry_run == 'true'
        run: |
          echo "Dry run: would publish ${IMAGE_NAME}:${{ needs.validate.outputs.version }}-native-${{ matrix.arch }}"

  native-manifest:
    needs:
      - validate
      - native-image
    runs-on: ubuntu-latest
    steps:
      - name: Dry-run native manifest summary
        if: needs.validate.outputs.dry_run == 'true'
        run: |
          echo "Dry run: would create ${IMAGE_NAME}:${{ needs.validate.outputs.version }}-native"

      - name: Set up Docker Buildx
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish native multi-arch manifest
        if: needs.validate.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$YANO_VERSION"
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}-native" \
            "${IMAGE_NAME}:${VERSION}-native-amd64" \
            "${IMAGE_NAME}:${VERSION}-native-arm64"
        env:
          YANO_VERSION: ${{ needs.validate.outputs.version }}

  promote-latest:
    needs:
      - validate
      - jvm-image
      - native-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Skip latest promotion
        if: needs.validate.outputs.promote_latest != 'true' || needs.validate.outputs.dry_run == 'true'
        run: |
          echo "Skipping latest Docker tag promotion"

      - name: Set up Docker Buildx
        if: needs.validate.outputs.promote_latest == 'true' && needs.validate.outputs.dry_run != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.promote_latest == 'true' && needs.validate.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote latest Docker tags
        if: needs.validate.outputs.promote_latest == 'true' && needs.validate.outputs.dry_run != 'true'
        shell: bash
        env:
          YANO_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest-jvm" \
            "${IMAGE_NAME}:${YANO_VERSION}-jvm"
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest-native" \
            "${IMAGE_NAME}:${YANO_VERSION}-native"

  docker-compose-zip:
    # promote-latest is an explicit no-op for dry runs and prereleases, but it
    # still depends on all image build/publish jobs.
    needs:
      - validate
      - promote-latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_tag }}
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Docker compose zip
        shell: bash
        env:
          YANO_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          ./gradlew :app:yanoDockerDistZip \
            -PyanoDockerReleaseVersion="$YANO_VERSION" \
            -PyanoDockerImageTag="$YANO_VERSION" \
            -PskipSigning=true

      - name: Validate compose zip
        shell: bash
        env:
          YANO_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          TMP_DIR="$(mktemp -d)"
          unzip -q "app/build/distributions/yano-docker-${YANO_VERSION}.zip" -d "$TMP_DIR"
          docker compose \
            -f "$TMP_DIR/yano-docker-${YANO_VERSION}/compose/yano.yml" \
            --env-file "$TMP_DIR/yano-docker-${YANO_VERSION}/compose/.env" \
            config >/dev/null

      - name: Upload compose zip to GitHub release
        if: needs.validate.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.git_tag }}
          files: app/build/distributions/yano-docker-*.zip
          prerelease: ${{ needs.validate.outputs.is_final != 'true' }}
          overwrite_files: true
          fail_on_unmatched_files: true
