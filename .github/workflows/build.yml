name: Clean, Build

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Jobs to run manually
        required: true
        default: connector-runtime
        type: choice
        options:
          - connector-runtime
          - all
  schedule:
    - cron: '23 3 * * 1'
  push:
    branches:
      - main
      - develop
      - develop*
      - release*
      - next
  pull_request:
    branches:
      - main
      - develop
      - develop*
      - release*
      - next

permissions:
  contents: read

jobs:
  commit-build:
    if: >-
      github.event_name != 'schedule' &&
      (github.event_name != 'workflow_dispatch' || inputs.scope == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: 'true'
      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build -PskipSigning=true --stacktrace
      - name: Verify app-chain cluster operator safety contracts
        run: |
          chmod +x app/appchain-cluster/test-private-key-inputs.sh \
            app/appchain-cluster/test-node-config-overlay.sh \
            app/appchain-cluster/test-cluster-state-safety.sh \
            app/appchain-cluster/test-cluster-identity-lifecycle.sh
          app/appchain-cluster/test-private-key-inputs.sh
          app/appchain-cluster/test-node-config-overlay.sh
          app/appchain-cluster/test-cluster-state-safety.sh
          app/appchain-cluster/test-cluster-identity-lifecycle.sh
      - name: Cross-validate published app-chain CDDL contracts
        env:
          CDDL_BIN: ${{ github.workspace }}/appchain/scripts/cddl-container.sh
          TMPDIR: ${{ github.workspace }}/build/cddl-tmp
        run: |
          mkdir -p "$TMPDIR"
          chmod +x "$CDDL_BIN"
          appchain/appchain-integration-contracts/scripts/verify-cddl.sh
          appchain/products/appchain-evidence-contracts/scripts/verify-cddl.sh
          appchain/appchain-composite-contracts/scripts/verify-cddl.sh
      - name: Verify ADR-013 demo release contracts
        run: bash app/appchain-effects-demo/tests/release-contracts.sh
      - name: Smoke final JVM plugin catalog and directory loading
        run: ./gradlew :app:packagedJvmPluginCatalogSmoke -PskipSigning=true --stacktrace
      - name: Verify and catalog-launch standalone plugin scaffold
        run: ./gradlew -p scaffolds/plugin-template clean build -PyanoSource="$PWD" -PskipSigning=true --stacktrace

  native-plugin-conformance:
    if: >-
      github.event_name != 'schedule' &&
      (github.event_name != 'workflow_dispatch' || inputs.scope == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: 'true'
      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build native plugin conformance image
        run: >-
          ./gradlew :app:quarkusBuild
          -PincludeFirstPartyPluginBundles=true
          -PincludeNativePluginConformanceFixture=true
          -Dquarkus.native.enabled=true
          -Dquarkus.package.jar.enabled=false
          -PskipSigning=true
      - name: Smoke test all native app-chain plugin SPIs
        run: >-
          ./gradlew :app:nativePluginCatalogSmoke
          -PincludeFirstPartyPluginBundles=true
          -PincludeNativePluginConformanceFixture=true
          -PskipSigning=true

  connector-fault-matrix:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'connector-runtime' || inputs.scope == 'all'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: 'true'
      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission
        run: >-
          chmod +x gradlew
          app/appchain-effects-demo/tests/connector-fault-matrix.sh
          appchain/extensions/appchain-kafka/src/test/scripts/kafka-secure-integration.sh
      - name: Run real connector restart and fault matrix
        run: app/appchain-effects-demo/tests/connector-fault-matrix.sh
      - name: Run Kafka sink and effect executor over real TLS and SASL/TLS
        run: appchain/extensions/appchain-kafka/src/test/scripts/kafka-secure-integration.sh

  effect-failover-e2e:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'connector-runtime' || inputs.scope == 'all'
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: 'true'
      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission
        run: >-
          chmod +x gradlew
          app/appchain-effects-demo/demo.sh
          app/appchain-effects-demo/tests/deployment-parity-contract.sh
          app/appchain-effects-demo/tests/deployment-parity-e2e.sh
          app/appchain-effects-demo/tests/effect-failover-contract.sh
          app/appchain-effects-demo/tests/effect-failover-e2e.sh
          app/appchain-effects-demo/tests/role-workflow-e2e.sh
      - name: Verify failover and deployment contracts
        run: >-
          app/appchain-effects-demo/tests/effect-failover-contract.sh &&
          app/appchain-effects-demo/tests/deployment-parity-contract.sh
      - name: Run mandatory isolated devnet effect failover E2E
        env:
          YANO_RUN_EFFECT_FAILOVER_E2E: 'true'
        run: app/appchain-effects-demo/tests/effect-failover-e2e.sh
      - name: Run mandatory composite direct-profile Compose and normal deployment parity E2E
        env:
          YANO_RUN_DEPLOYMENT_PARITY_E2E: 'true'
          YANO_DEPLOYMENT_PARITY_CONTINUATION_MODE: direct
          YANO_DEPLOYMENT_PARITY_MACHINE: composite
        run: app/appchain-effects-demo/tests/deployment-parity-e2e.sh
      - name: Run mandatory role workflow and one-member catch-up E2E
        env:
          YANO_RUN_ROLE_WORKFLOW_E2E: 'true'
        run: app/appchain-effects-demo/tests/role-workflow-e2e.sh

  milestone-1-release-acceptance:
    needs:
      - commit-build
      - native-plugin-conformance
      - connector-fault-matrix
      - effect-failover-e2e
    if: >-
      always() &&
      github.event_name != 'schedule' &&
      (github.event_name != 'workflow_dispatch' || inputs.scope == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every Milestone 1 release gate
        env:
          COMMIT_BUILD_RESULT: ${{ needs.commit-build.result }}
          NATIVE_PLUGIN_RESULT: ${{ needs.native-plugin-conformance.result }}
          CONNECTOR_FAULT_RESULT: ${{ needs.connector-fault-matrix.result }}
          EFFECT_FAILOVER_RESULT: ${{ needs.effect-failover-e2e.result }}
        run: |
          set -euo pipefail
          test "$COMMIT_BUILD_RESULT" = success
          test "$NATIVE_PLUGIN_RESULT" = success
          test "$CONNECTOR_FAULT_RESULT" = success
          test "$EFFECT_FAILOVER_RESULT" = success
          printf '%s\n' 'PASS: ADR-013 Milestone 1 release acceptance gates succeeded'
