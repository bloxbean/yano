name: Release Distribution

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      is_final: ${{ steps.version.outputs.is_final }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(./gradlew -q properties | awk '/^version:/ { print $2; exit }')
          if [[ "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match Gradle version ${VERSION}" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-SNAPSHOT* ]]; then
            echo "Release tags require a non-SNAPSHOT version. Got: $VERSION" >&2
            exit 1
          fi

          IS_FINAL=false
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_FINAL=true
          fi

          echo "is_final=$IS_FINAL" >> "$GITHUB_OUTPUT"

  jar-dist:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build uber-jar distribution
        run: ./gradlew :app:yanoDistZip -PskipSigning=true
      - name: Upload JAR distribution
        uses: actions/upload-artifact@v4
        with:
          name: jar-dist
          path: app/build/distributions/yano-*.zip

  native-dist:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
          - os: ubuntu-22.04-arm
            label: linux-arm64
          - os: macos-14
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build native binary
        run: ./gradlew :app:quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -PskipSigning=true
      - name: Package native distribution
        run: ./gradlew :app:yanoNativeDistZip -PskipSigning=true
      - name: Upload native distribution
        uses: actions/upload-artifact@v4
        with:
          name: native-dist-${{ matrix.label }}
          path: app/build/distributions/yano-native-*.zip

  release:
    needs: [validate, jar-dist, native-dist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: false
          prerelease: ${{ needs.validate.outputs.is_final != 'true' }}
