plugins {
    id 'java-test-fixtures'
}

dependencies {
    // Evidence records expose connector value types in their public API.
    // Framework outcome/state APIs are deliberately mapped by the registry.
    api project(':appchain-integration-contracts')
    api project(':appchain-role-workflow-contracts')
    implementation libs.cardano.client.crypto
    implementation libs.cbor
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.named('compileJava') {
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

tasks.withType(Javadoc).configureEach {
    options.addBooleanOption('Xdoclint:all,-missing', true)
}

def evidenceContractEntries = [
        'META-INF/yano/contracts/evidence/v1/evidence-v1.cddl',
        'META-INF/yano/contracts/evidence/v1/golden-vectors.properties'
]
def forbiddenPluginPrefixes = [
        'META-INF/yano/plugins/',
        'META-INF/services/'
]

tasks.register('verifyEvidenceContractArtifact') {
    group = 'verification'
    description = 'Verifies the evidence contracts JAR is complete and contributes no plugin SPI'
    dependsOn tasks.named('jar'), tasks.named('generatePomFileForMavenJavaPublication')
    inputs.file(tasks.named('jar').flatMap { it.archiveFile })
    inputs.file(layout.buildDirectory.file('publications/mavenJava/pom-default.xml'))

    doLast {
        def archive = tasks.named('jar').get().archiveFile.get().asFile
        new java.util.zip.ZipFile(archive).withCloseable { jar ->
            def entries = jar.entries().collect { entry -> entry.name }
            evidenceContractEntries.each { entryName ->
                def entry = jar.getEntry(entryName)
                if (entry == null || entry.size == 0) {
                    throw new GradleException(
                            "Missing or empty evidence contract artifact entry: ${entryName}")
                }
            }
            if (entries.any { entry ->
                forbiddenPluginPrefixes.any { prefix -> entry.startsWith(prefix) }
            }) {
                throw new GradleException(
                        'Evidence contracts must not contribute app-chain plugin services')
            }
            if (entries.any { entry ->
                entry.startsWith('com/bloxbean/cardano/yano/api/')
                        || entry.startsWith('com/bloxbean/cardano/yaci/')
            }) {
                throw new GradleException(
                        'Evidence contracts must not embed framework or Yaci classes')
            }
        }
        def pom = layout.buildDirectory.file(
                'publications/mavenJava/pom-default.xml').get().asFile.getText('UTF-8')
        if (pom.contains('<artifactId>yano-core-api</artifactId>')) {
            throw new GradleException(
                    'Evidence contracts published POM must not depend on core-api')
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyEvidenceContractArtifact')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            suppressPomMetadataWarningsFor('testFixturesApiElements')
            suppressPomMetadataWarningsFor('testFixturesRuntimeElements')
            pom {
                name = 'Yano App-Chain Evidence Contracts'
                description = 'Canonical no-SPI evidence workflow wire and state contracts'
            }
        }
    }
}
