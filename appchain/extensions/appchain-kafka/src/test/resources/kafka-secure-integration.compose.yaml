name: ${KAFKA_SECURE_PROJECT:?}

services:
  kafka:
    image: ${KAFKA_SECURE_IMAGE:?}
    restart: "no"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SSL:SSL,SASL_SSL:SASL_SSL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,SSL://:29094,SASL_SSL://:29095
      KAFKA_ADVERTISED_LISTENERS: SSL://localhost:${KAFKA_SECURE_TLS_PORT:?},SASL_SSL://localhost:${KAFKA_SECURE_SASL_PORT:?}
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_SSL_KEYSTORE_FILENAME: broker.p12
      KAFKA_SSL_KEY_CREDENTIALS: store-password
      KAFKA_SSL_KEYSTORE_CREDENTIALS: store-password
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/truststore.p12
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SECURE_STORE_PASSWORD:?}
      KAFKA_SSL_TRUSTSTORE_TYPE: PKCS12
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASL_SSL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required user_yano="${KAFKA_SECURE_SASL_PASSWORD:?}";
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - type: bind
        source: ${KAFKA_SECURE_CERT_DIR:?}
        target: /etc/kafka/secrets
        read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/lib/kafka/data:size=256m,mode=0700,uid=1000,gid=1000
      - /opt/kafka/config:size=16m,mode=0700,uid=1000,gid=1000
      - /opt/kafka/logs:size=64m,mode=0700,uid=1000,gid=1000
    ports:
      - target: 29094
        published: ${KAFKA_SECURE_TLS_PORT:?}
        host_ip: 127.0.0.1
      - target: 29095
        published: ${KAFKA_SECURE_SASL_PORT:?}
        host_ip: 127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w 3 127.0.0.1 29094 && nc -z -w 3 127.0.0.1 29095"]
      interval: 2s
      timeout: 4s
      start_period: 15s
      retries: 45
