plugins {
    id 'com.gradleup.shadow'
}

// Kafka integration for finalized app blocks (ADR 006 E3.2) and acknowledged
// kafka.publish effects (ADR 013), packaged as one T3 plugin bundle.
dependencies {
    compileOnly project(':core-api')          // provided by the node at runtime
    implementation project(':appchain-integration-contracts')
    implementation libs.kafka.clients
    implementation libs.slf4j.api

    testImplementation project(':core-api')
    testImplementation project(':appchain-testkit')
    testImplementation libs.kafka.clients
    testImplementation libs.junit.jupiter.api
    testRuntimeOnly libs.junit.jupiter.engine
    testRuntimeOnly libs.junit.platform.launcher
    testImplementation libs.assertj.core
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.named('compileJava') {
    // No annotation processor in this module consumes the repository-wide
    // project identity option.
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

// Keep the normal artifact thin for build-time/native inclusion. The bundle
// classifier is the self-contained drop-in artifact for yaci.plugins.directory.
tasks.named('shadowJar') {
    archiveBaseName.set("yano-${project.name}")
    archiveClassifier.set('bundle')
    reproducibleFileOrder = true
    preserveFileTimestamps = false
    mergeServiceFiles()
    // A directory-loaded bundle is self-contained and may coexist with
    // independently versioned connector bundles. Keep its contract classes
    // private; only frozen CBOR bytes cross the host SPI boundary.
    relocate 'com.bloxbean.cardano.yano.appchain.integration',
            'com.bloxbean.cardano.yano.appchain.kafka.internal.contracts.v1'
    relocate 'co.nstant.in.cbor',
            'com.bloxbean.cardano.yano.appchain.kafka.internal.contracts.v1deps.cbor'
    relocate 'org.bouncycastle',
            'com.bloxbean.cardano.yano.appchain.kafka.internal.contracts.v1deps.bouncycastle'
    exclude 'com/bloxbean/cardano/yano/api/**'
    exclude 'META-INF/*.SF', 'META-INF/*.RSA', 'META-INF/*.DSA', 'module-info.class'
}

def unrelocatedContractPrefix =
        'com/bloxbean/cardano/yano/appchain/integration/'
def relocatedContractPrefix =
        'com/bloxbean/cardano/yano/appchain/kafka/internal/contracts/v1/'
def relocatedCborPrefix =
        'com/bloxbean/cardano/yano/appchain/kafka/internal/contracts/v1deps/cbor/'
def relocatedBouncyCastlePrefix =
        'com/bloxbean/cardano/yano/appchain/kafka/internal/contracts/v1deps/bouncycastle/'
def kafkaSinkService =
        'META-INF/services/com.bloxbean.cardano.yano.api.appchain.sink.FinalizedStreamSinkFactory'
def kafkaEffectService =
        'META-INF/services/com.bloxbean.cardano.yano.api.appchain.effects.AppEffectExecutorFactory'
def kafkaManifest =
        'META-INF/yano/plugins/com.bloxbean.cardano.yano.appchain.kafka.json'

tasks.register('verifyKafkaArtifactBoundaries') {
    group = 'verification'
    description = 'Verifies thin/native and self-contained Kafka bundle class boundaries'
    dependsOn tasks.named('jar'), tasks.named('shadowJar')
    inputs.files(tasks.named('jar').flatMap { it.archiveFile },
            tasks.named('shadowJar').flatMap { it.archiveFile })

    doLast {
        def thin = tasks.named('jar').get().archiveFile.get().asFile
        def bundle = tasks.named('shadowJar').get().archiveFile.get().asFile
        if (!thin.name.startsWith('yano-appchain-kafka-')
                || thin.name.contains('kafka-sink')) {
            throw new GradleException("Unexpected renamed Kafka thin artifact: ${thin.name}")
        }
        if (!bundle.name.startsWith('yano-appchain-kafka-')
                || !bundle.name.endsWith('-bundle.jar')
                || bundle.name.contains('kafka-sink')) {
            throw new GradleException("Unexpected renamed Kafka bundle artifact: ${bundle.name}")
        }

        def entryNames = { File archive ->
            new java.util.zip.ZipFile(archive).withCloseable { zip ->
                zip.entries().collect { entry -> entry.name }.toSet()
            }
        }
        def thinEntries = entryNames(thin)
        def bundleEntries = entryNames(bundle)

        if (thinEntries.any { it.startsWith(unrelocatedContractPrefix)
                || it.startsWith(relocatedContractPrefix)
                || it.startsWith('org/apache/kafka/') }) {
            throw new GradleException(
                    'Kafka thin/native artifact embeds a connector contract or Kafka dependency')
        }
        if (!bundleEntries.contains(
                'org/apache/kafka/clients/producer/KafkaProducer.class')) {
            throw new GradleException('Kafka drop-in bundle does not contain the Kafka client')
        }
        if (!bundleEntries.contains(relocatedContractPrefix
                + 'kafka/KafkaPublishCommandV1.class')) {
            throw new GradleException(
                    'Kafka drop-in bundle does not contain relocated connector contracts')
        }
        if (bundleEntries.any { it.startsWith(unrelocatedContractPrefix) }) {
            throw new GradleException(
                    'Kafka drop-in bundle exposes unrelocated connector contract classes')
        }
        if (!bundleEntries.contains(relocatedCborPrefix + 'CborDecoder.class')
                || bundleEntries.any { it.startsWith('co/nstant/in/cbor/') }) {
            throw new GradleException(
                    'Kafka drop-in bundle does not privately relocate the CBOR codec')
        }
        if (!bundleEntries.contains(relocatedBouncyCastlePrefix
                + 'crypto/digests/Blake2bDigest.class')
                || bundleEntries.any { it.startsWith('org/bouncycastle/') }) {
            throw new GradleException(
                    'Kafka drop-in bundle does not privately relocate the BLAKE2b provider')
        }
        if (bundleEntries.any { it.startsWith('com/bloxbean/cardano/yano/api/') }) {
            throw new GradleException('Kafka drop-in bundle embeds host Yano API classes')
        }
        [kafkaSinkService, kafkaEffectService, kafkaManifest].each { entry ->
            if (!thinEntries.contains(entry) || !bundleEntries.contains(entry)) {
                throw new GradleException(
                        "Kafka artifacts are missing plugin metadata entry ${entry}")
            }
        }

        def readEntry = { File archive, String entryName ->
            new java.util.zip.ZipFile(archive).withCloseable { zip ->
                def entry = zip.getEntry(entryName)
                zip.getInputStream(entry).getText('UTF-8')
            }
        }
        def expectedServices = [
                (kafkaSinkService):
                        'com.bloxbean.cardano.yano.appchain.kafka.KafkaSinkFactory',
                (kafkaEffectService):
                        'com.bloxbean.cardano.yano.appchain.kafka.effects.'
                                + 'KafkaEffectExecutorFactory'
        ]
        [thin, bundle].each { artifact ->
            expectedServices.each { service, provider ->
                def providers = readEntry(artifact, service).readLines()
                        .collect { it.trim() }
                        .findAll { !it.isBlank() && !it.startsWith('#') }
                if (providers != [provider]) {
                    throw new GradleException(
                            "Unexpected ${service} providers in ${artifact.name}: ${providers}")
                }
            }
            def manifest = new groovy.json.JsonSlurper().parseText(
                    readEntry(artifact, kafkaManifest))
            def contributions = manifest.contributions.collect {
                "${it.kind}:${it.name}:${it.provider}"
            }.toSet()
            def expectedContributions = Set.of(
                    'finalized-sink:kafka:'
                            + 'com.bloxbean.cardano.yano.appchain.kafka.KafkaSinkFactory',
                    'effect-executor:kafka:'
                            + 'com.bloxbean.cardano.yano.appchain.kafka.effects.'
                            + 'KafkaEffectExecutorFactory')
            if (manifest.id != 'com.bloxbean.cardano.yano.appchain.kafka'
                    || manifest.contributions.size() != 2
                    || contributions != expectedContributions) {
                throw new GradleException(
                        "Unexpected Kafka plugin manifest in ${artifact.name}")
            }
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyKafkaArtifactBoundaries')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact(tasks.named('shadowJar')) {
                classifier = 'bundle'
            }
            pom {
                name = 'Yano App-Chain Kafka Integration'
                description = 'Kafka plugin for finalized app-block export and acknowledged app-chain effects'
            }
        }
    }
}
