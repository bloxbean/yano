// App-chain script anchor — on-chain validators written in Java (julc,
// ADR app-layer/008.4 §2.4). The compiled UPLC artifacts under
// src/main/resources/META-INF/plutus/ are CHECKED IN (not regenerated at
// build time): the script hash derived from them is the chain's on-chain
// IDENTITY, so it must be byte-stable across machines and julc versions.
// The released julc 0.1.0-pre14 miscompiles the validator's loop-carried
// state. The checked validator was generated with post-release julc commit
// 94eaecee3220. To regenerate after a deliberate source/compiler change,
// first run JulcSourceCompile* with -Djulc.source-check=true and
// --include-build pointing at that julc checkout, then rebuild julc-cli's
// shadowJar and refresh the JSON from a clean CLI compile. Finally run this
// module's complete checked-artifact suite and the runtime identity golden.
plugins {
    id 'java-library'
}

description = 'Yano app-chain anchor validators (julc/Java default implementation, ADR 008.4)'

dependencies {
    // compileOnly: julc's authoring stack COMPILES the validator sources (never
    // loaded at runtime — consumers read only META-INF/plutus/*.json). The
    // compiled UPLC artifacts are CHECKED IN, not generated at build time, so
    // there is no annotation processor here; the opt-in JulcSourceCompile* tests
    // recompile from source only as a drift check.
    compileOnly "com.bloxbean.cardano:julc-stdlib:${libs.versions.julc.get()}"
    compileOnly "com.bloxbean.cardano:julc-ledger-api:${libs.versions.julc.get()}"

    testImplementation "com.bloxbean.cardano:julc-stdlib:${libs.versions.julc.get()}"
    testImplementation "com.bloxbean.cardano:julc-ledger-api:${libs.versions.julc.get()}"
    testImplementation "com.bloxbean.cardano:julc-testkit:${libs.versions.julc.get()}"
    testImplementation "com.bloxbean.cardano:julc-compiler:${libs.versions.julc.get()}"
    testRuntimeOnly "com.bloxbean.cardano:julc-vm-java:${libs.versions.julc.get()}"
    testImplementation libs.junit.jupiter.api
    testImplementation libs.assertj.core
    testRuntimeOnly libs.junit.jupiter.engine
}

test {
    useJUnitPlatform()
    // Forward the drift-check opt-in into the forked test JVM: Gradle does NOT
    // propagate command-line -D properties to test workers, so without this the
    // documented `-Djulc.source-check=true` regeneration flow would silently
    // skip the JulcSourceCompile* suites and report green.
    systemProperty 'julc.source-check', System.getProperty('julc.source-check', 'false')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Anchor Validators (on-chain)'
                description = 'Plutus V3 anchor validator + one-shot thread policy, authored in Java (julc)'
            }
        }
    }
}
