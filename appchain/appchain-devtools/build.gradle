plugins {
    id 'application'
}

dependencies {
    implementation(project(':appchain-config')) {
        transitive = false
    }
    compileOnly(project(':core-api')) {
        transitive = false
    }
    runtimeOnly(project(':core-api')) {
        transitive = false
    }
    implementation libs.jackson.databind
    implementation libs.jackson.dataformat.yaml
    implementation libs.smallrye.config.core
    implementation libs.smallrye.config.yaml
}

application {
    applicationName = 'yano-appchain'
    mainClass = 'com.bloxbean.cardano.yano.appchain.devtools.AppChainDevtoolsCli'
}

def generatedMetadataDirectory = layout.buildDirectory.dir('generated/appchain-metadata')

distributions {
    main {
        distributionBaseName = 'yano-devtools'
        contents {
            from('README.md')
            from(generatedMetadataDirectory) {
                into 'metadata'
            }
        }
    }
}

tasks.register('generateAppChainMetadata', JavaExec) {
    dependsOn tasks.named('compileJava')
    classpath = files(sourceSets.main.output.classesDirs) + configurations.runtimeClasspath
    mainClass = 'com.bloxbean.cardano.yano.appchain.devtools.AppChainMetadataExportMain'
    args generatedMetadataDirectory.get().asFile.absolutePath
    inputs.files(sourceSets.main.allJava)
    inputs.dir('src/main/resources/appchain-dx/v1alpha1')
    outputs.dir(generatedMetadataDirectory)
    doLast {
        copy {
            from('src/main/resources/appchain-dx/v1alpha1')
            into(generatedMetadataDirectory.get().dir('appchain-dx/v1alpha1').asFile)
        }
    }
}

tasks.named('jar') {
    manifest {
        attributes('Implementation-Version': project.version)
    }
}

tasks.named('processResources') {
    dependsOn tasks.named('generateAppChainMetadata')
    from(generatedMetadataDirectory) {
        exclude 'appchain-dx/v1alpha1/**'
    }
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Developer Tools'
                description = 'Offline app-chain configuration validation, explanation, and project generation CLI'
            }
        }
    }
}

def packagedCliInstall = tasks.named('installDist')
def packagedCliZip = tasks.named('distZip')
def finalYanoZip = project(':app').tasks.named('yanoDistZip', Zip)

tasks.named('test') {
    dependsOn packagedCliInstall, packagedCliZip, finalYanoZip
    doFirst {
        systemProperty 'yano.test.repo-root', rootProject.projectDir.absolutePath
        systemProperty 'yano.test.appchain-cli-install-dir',
                layout.buildDirectory.dir('install/yano-devtools').get().asFile.absolutePath
        systemProperty 'yano.test.appchain-cli-dist-zip',
                packagedCliZip.get().archiveFile.get().asFile.absolutePath
        systemProperty 'yano.test.final-yano-dist-zip',
                finalYanoZip.get().archiveFile.get().asFile.absolutePath
    }
}

tasks.register('finalDistributionRuntimeAcceptance', Exec) {
    group = 'verification'
    description = 'Runs a generated two-node app-chain project from the final Yano archive.'
    dependsOn finalYanoZip
    commandLine 'bash', file('src/test/scripts/final-distribution-runtime-acceptance.sh'),
            finalYanoZip.flatMap { it.archiveFile }.get().asFile
}

tasks.register('verifySmallRyeConfigRuntimeParity') {
    group = 'verification'
    description = 'Verifies the devtools and Quarkus runtime select the same SmallRye Config engine'
    doLast {
        def selectedVersion = { configuration, moduleName ->
            def versions = configuration.resolvedConfiguration.resolvedArtifacts
                    .findAll { artifact ->
                        artifact.moduleVersion.id.group == 'io.smallrye.config'
                                && artifact.moduleVersion.id.name == moduleName
                    }
                    .collect { it.moduleVersion.id.version }
                    .toSet()
            if (versions.size() != 1) {
                throw new GradleException("Expected one ${moduleName} version, found ${versions}")
            }
            versions.first()
        }
        def cliVersion = selectedVersion(configurations.runtimeClasspath, 'smallrye-config-core')
        def runtimeVersion = selectedVersion(
                project(':app').configurations.runtimeClasspath, 'smallrye-config-core')
        if (cliVersion != runtimeVersion) {
            throw new GradleException(
                    "SmallRye Config mismatch: devtools=${cliVersion}, runtime=${runtimeVersion}")
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifySmallRyeConfigRuntimeParity')
}
