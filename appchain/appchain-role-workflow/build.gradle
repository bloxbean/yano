dependencies {
    api project(':core-api')
    api project(':appchain-composite')
    api project(':appchain-role-workflow-contracts')

    implementation libs.cbor

    testImplementation project(':appchain-testkit')
    testImplementation libs.assertj.core
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.named('compileJava') {
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

tasks.register('verifyGenericRoleWorkflowBoundary') {
    group = 'verification'
    description = 'Verifies the generic role product has no evidence-owned contribution'
    dependsOn tasks.named('jar')
    inputs.file(tasks.named('jar').flatMap { it.archiveFile })

    doLast {
        def archive = tasks.named('jar').get().archiveFile.get().asFile
        new java.util.zip.ZipFile(archive).withCloseable { jar ->
            def entries = jar.entries().collect { entry -> entry.name }
            if (entries.any { entry ->
                !entry.endsWith('/')
                        && entry.startsWith('com/bloxbean/cardano/yano/appchain/evidence/')
            }) {
                throw new GradleException(
                        'Generic role-workflow artifact contains evidence-owned entries')
            }
            def servicePrefix = 'META-INF/services/'
            def allowedServices = [
                    servicePrefix + 'com.bloxbean.cardano.yano.api.appchain.AppStateMachineProvider',
                    servicePrefix + 'com.bloxbean.cardano.yano.api.plugin.domain.DomainApiProvider'
            ].toSet()
            def services = entries.findAll { entry ->
                !entry.endsWith('/') && entry.startsWith(servicePrefix)
            }.toSet()
            def manifests = entries.findAll { entry ->
                !entry.endsWith('/') && entry.startsWith('META-INF/yano/plugins/')
            }
            if (services != allowedServices || manifests != [
                    'META-INF/yano/plugins/'
                            + 'com.bloxbean.cardano.yano.appchain.role-workflow.json']) {
                throw new GradleException(
                        'Generic role-workflow plugin metadata is incomplete or unexpected')
            }
        }
        def forbidden = configurations.compileClasspath.incoming.resolutionResult
                .allComponents.findAll { component ->
            component.id instanceof org.gradle.api.artifacts.component.ProjectComponentIdentifier
                    && component.id.projectPath.startsWith(':appchain-evidence-')
        }
        if (!forbidden.isEmpty()) {
            throw new GradleException(
                    'Generic role-workflow compile classpath depends on evidence projects: '
                            + forbidden.collect { it.id.projectPath }.sort())
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyGenericRoleWorkflowBoundary')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Role Workflow'
                description = 'Deterministic domain-actor registry and role-aware approval components'
            }
        }
    }
}
