plugins {
    id 'com.gradleup.shadow'
}

dependencies {
    compileOnly project(':core-api')
    implementation(project(':appchain-evidence-contracts')) {
        transitive = false
    }
    implementation(project(':appchain-integration-contracts')) {
        transitive = false
    }
    implementation libs.cbor
    implementation libs.bouncycastle.bcprov

    testImplementation project(':core-api')
    testImplementation project(':appchain-testkit')
    testImplementation testFixtures(project(':appchain-evidence-contracts'))
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.named('compileJava') {
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

// The normal artifact remains thin for build-time/native inclusion. The
// classifier bundle is a self-contained drop-in plugin whose evidence and
// connector contract implementation types are pinned to private namespaces.
tasks.named('shadowJar') {
    archiveBaseName.set("yano-${project.name}")
    archiveClassifier.set('bundle')
    reproducibleFileOrder = true
    preserveFileTimestamps = false
    mergeServiceFiles()
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.EvidenceContract',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.EvidenceContract'
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.command',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.command'
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.event',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.event'
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.query',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.query'
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.state',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.state'
    relocate 'com.bloxbean.cardano.yano.appchain.examples.evidence.internal.EvidenceValidation',
            'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts.v1.internal.EvidenceValidation'
    relocate 'com.bloxbean.cardano.yano.appchain.integration',
            'com.bloxbean.cardano.yano.appchain.examples.evidence.internal.contracts.v1'
    relocate 'co.nstant.in.cbor',
            'com.bloxbean.cardano.yano.appchain.examples.evidence.internal.contracts.v1deps.cbor'
    relocate 'org.bouncycastle',
            'com.bloxbean.cardano.yano.appchain.examples.evidence.internal.contracts.v1deps.bouncycastle'
    exclude 'com/bloxbean/cardano/yano/api/**'
    exclude 'META-INF/services/java.security.Provider'
    exclude 'META-INF/*.SF', 'META-INF/*.RSA', 'META-INF/*.DSA', 'module-info.class'
}

def stateMachineService =
        'META-INF/services/com.bloxbean.cardano.yano.api.appchain.AppStateMachineProvider'
def domainApiService =
        'META-INF/services/com.bloxbean.cardano.yano.api.plugin.domain.DomainApiProvider'
def pluginManifest =
        'META-INF/yano/plugins/com.bloxbean.cardano.yano.appchain.evidence-registry.json'
def unrelocatedContracts = 'com/bloxbean/cardano/yano/appchain/integration/'
def relocatedContracts =
        'com/bloxbean/cardano/yano/appchain/examples/evidence/internal/contracts/v1/'
def relocatedCbor =
        'com/bloxbean/cardano/yano/appchain/examples/evidence/internal/contracts/v1deps/cbor/'
def originalEvidenceContractRoot =
        'com/bloxbean/cardano/yano/appchain/examples/evidence/'
def relocatedEvidenceContractRoot =
        'com/bloxbean/cardano/yano/appchain/examples/internal/evidencecontracts/v1/'
def relocatedEvidenceContractCodec =
        relocatedEvidenceContractRoot + 'command/EvidenceCommandCodec.class'
def isOriginalEvidenceContract = { String entry ->
    entry == originalEvidenceContractRoot + 'EvidenceContract.class'
            || ['command/', 'event/', 'query/', 'state/'].any {
        entry.startsWith(originalEvidenceContractRoot + it)
    }
            || entry == originalEvidenceContractRoot + 'internal/EvidenceValidation.class'
}
def relocatedEvidenceContractEntries = [
        relocatedEvidenceContractRoot + 'EvidenceContract.class',
        relocatedEvidenceContractCodec,
        relocatedEvidenceContractRoot + 'event/EvidenceAvailableEventV1.class',
        relocatedEvidenceContractRoot + 'query/EvidenceGetRequestV1.class',
        relocatedEvidenceContractRoot + 'state/EvidenceRecordV1.class',
        relocatedEvidenceContractRoot + 'state/EvidenceTerminalOutcome.class',
        relocatedEvidenceContractRoot + 'internal/EvidenceValidation.class'
]
def executableRegistryEntries = [
        originalEvidenceContractRoot + 'EvidenceRegistryConfig.class',
        originalEvidenceContractRoot + 'EvidenceRegistryDomainApi.class',
        originalEvidenceContractRoot + 'EvidenceRegistryDomainApiProvider.class',
        originalEvidenceContractRoot + 'EvidenceRegistryStateMachine.class',
        originalEvidenceContractRoot + 'EvidenceRegistryStateMachineProvider.class'
]
def stateMachineProvider =
        'com.bloxbean.cardano.yano.appchain.examples.evidence.EvidenceRegistryStateMachineProvider'
def domainApiProvider =
        'com.bloxbean.cardano.yano.appchain.examples.evidence.EvidenceRegistryDomainApiProvider'
def allowedBundleServices = [stateMachineService, domainApiService] as Set
def forbiddenBundlePrefixes = [
        'com/bloxbean/cardano/yaci/',
        'com/bloxbean/cardano/yano/api/',
        'com/fasterxml/jackson/',
        'io/netty/',
        'org/reactivestreams/',
        'reactor/'
]
def maxBundleBytes = 12L * 1024L * 1024L
def maxBundleEntries = 7_500

tasks.register('verifyEvidenceRegistryArtifactBoundaries') {
    group = 'verification'
    description = 'Verifies evidence-registry thin and drop-in plugin boundaries'
    dependsOn tasks.named('jar'), tasks.named('shadowJar')
    inputs.files(tasks.named('jar').flatMap { it.archiveFile },
            tasks.named('shadowJar').flatMap { it.archiveFile })

    doLast {
        def thin = tasks.named('jar').get().archiveFile.get().asFile
        def bundle = tasks.named('shadowJar').get().archiveFile.get().asFile
        def entryNames = { File archive ->
            new java.util.zip.ZipFile(archive).withCloseable { zip ->
                zip.entries().collect { entry -> entry.name }.toSet()
            }
        }
        def entryText = { File archive, String entryName ->
            new java.util.zip.ZipFile(archive).withCloseable { zip ->
                def entry = zip.getEntry(entryName)
                entry == null ? null : zip.getInputStream(entry).getText('UTF-8')
            }
        }
        def thinEntries = entryNames(thin)
        def bundleEntries = entryNames(bundle)
        if (thinEntries.any { it.startsWith(unrelocatedContracts)
                || it.startsWith(relocatedContracts)
                || it.startsWith('co/nstant/in/cbor/')
                || isOriginalEvidenceContract(it)
                || it.startsWith(relocatedEvidenceContractRoot) }) {
            throw new GradleException('Evidence registry thin artifact embeds implementation dependencies')
        }
        if (bundleEntries.any(isOriginalEvidenceContract)
                || !bundleEntries.containsAll(relocatedEvidenceContractEntries)) {
            throw new GradleException(
                    'Evidence registry bundle does not privately relocate its evidence contracts')
        }
        if (!executableRegistryEntries.every { bundleEntries.contains(it) }
                || executableRegistryEntries.any { entry ->
            bundleEntries.contains(relocatedEvidenceContractRoot
                    + entry.substring(originalEvidenceContractRoot.length()))
        }) {
            throw new GradleException(
                    'Evidence registry bundle relocated or omitted executable plugin classes')
        }
        if (!bundleEntries.contains(relocatedContracts + 'ConnectorTypes.class')
                || bundleEntries.any { it.startsWith(unrelocatedContracts) }) {
            throw new GradleException('Evidence registry bundle does not privately relocate connector contracts')
        }
        if (!bundleEntries.contains(relocatedCbor + 'CborDecoder.class')
                || bundleEntries.any { it.startsWith('co/nstant/in/cbor/') }) {
            throw new GradleException('Evidence registry bundle does not privately relocate CBOR')
        }
        def forbiddenEntries = bundleEntries.findAll { entry ->
            forbiddenBundlePrefixes.any { prefix -> entry.startsWith(prefix) }
        }
        if (!forbiddenEntries.isEmpty()) {
            throw new GradleException(
                    'Evidence registry bundle embeds forbidden host/runtime classes: '
                            + forbiddenEntries.toList().sort().take(5).join(', '))
        }
        def unexpectedServices = bundleEntries.findAll { entry ->
            entry.startsWith('META-INF/services/') && !entry.endsWith('/')
                    && !allowedBundleServices.contains(entry)
        }
        if (!unexpectedServices.isEmpty()) {
            throw new GradleException(
                    'Evidence registry bundle embeds unexpected ServiceLoader entries: '
                            + unexpectedServices.toList().sort().join(', '))
        }
        if (bundle.length() > maxBundleBytes || bundleEntries.size() > maxBundleEntries) {
            throw new GradleException(
                    "Evidence registry bundle closure is unexpectedly large: "
                            + "${bundle.length()} bytes, ${bundleEntries.size()} entries")
        }
        [stateMachineService, domainApiService, pluginManifest].each { entry ->
            if (!thinEntries.contains(entry) || !bundleEntries.contains(entry)) {
                throw new GradleException("Evidence registry artifact is missing ${entry}")
            }
        }
        def machineServices = entryText(bundle, stateMachineService)
        def domainServices = entryText(bundle, domainApiService)
        def manifest = entryText(bundle, pluginManifest)
        if (machineServices == null || !machineServices.readLines().contains(stateMachineProvider)
                || domainServices == null || !domainServices.readLines().contains(domainApiProvider)
                || manifest == null || !manifest.contains(stateMachineProvider)
                || !manifest.contains(domainApiProvider)
                || manifest.contains(
                'com.bloxbean.cardano.yano.appchain.examples.internal.evidencecontracts')) {
            throw new GradleException(
                    'Evidence registry host-facing provider names were rewritten by relocation')
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyEvidenceRegistryArtifactBoundaries')
}

tasks.withType(Javadoc).configureEach {
    // Keep structural/link doclint enabled without requiring repetitive tags
    // on every small record accessor in this reference module.
    options.addBooleanOption('Xdoclint:all,-missing', true)
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact(tasks.named('shadowJar')) {
                classifier = 'bundle'
            }
            pom {
                name = 'Yano App-Chain Evidence Registry Example'
                description = 'Deterministic reference evidence workflow state machine and plugin'
            }
        }
    }
}
