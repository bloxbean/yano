dependencies {
    implementation libs.cbor
    implementation libs.bouncycastle.bcprov
}

tasks.named('compileJava') {
    // This module has no annotation processor that consumes the repository-wide
    // project identity option, so do not emit an irrelevant javac processing warning.
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

def connectorCddlNames = [
        'common-v1.cddl',
        'detail-v1.cddl',
        'ipfs-pin-v1.cddl',
        'kafka-publish-v1.cddl',
        'object-put-v1.cddl'
]
def connectorCddlSources = connectorCddlNames.collect {
    file("src/main/cddl/connectors/${it}")
}
def generatedContractResources = layout.buildDirectory.dir(
        'generated/connector-contract-resources')
def aggregateCddlPath = 'META-INF/yano/contracts/connectors/v1/connectors-v1.cddl'
def aggregateCddlHeader = '''; Generated by appchain-integration-contracts. Do not edit this file.
; The ordered source fragments are published beside this aggregate.

'''

tasks.register('generateConnectorAggregateCddl') {
    inputs.files(connectorCddlSources)
    outputs.file(generatedContractResources.map { it.file(aggregateCddlPath) })
    doLast {
        def output = generatedContractResources.get().file(aggregateCddlPath).asFile
        output.parentFile.mkdirs()
        def body = connectorCddlSources.collect { source ->
            source.getText('UTF-8').trim()
        }.join('\n\n')
        output.setText(aggregateCddlHeader + body + '\n', 'UTF-8')
    }
}

tasks.named('processResources') {
    dependsOn tasks.named('generateConnectorAggregateCddl')
    from('src/main/cddl/connectors') {
        into 'META-INF/yano/contracts/connectors/v1'
        include '*.cddl'
    }
    from(generatedContractResources)
}

def contractArtifactEntries = [
        aggregateCddlPath,
        'META-INF/yano/contracts/connectors/v1/common-v1.cddl',
        'META-INF/yano/contracts/connectors/v1/detail-v1.cddl',
        'META-INF/yano/contracts/connectors/v1/ipfs-pin-v1.cddl',
        'META-INF/yano/contracts/connectors/v1/kafka-publish-v1.cddl',
        'META-INF/yano/contracts/connectors/v1/object-put-v1.cddl',
        'META-INF/yano/contracts/connectors/v1/golden-vectors.properties'
]

tasks.register('verifyContractArtifact') {
    dependsOn tasks.named('jar')
    doLast {
        def archive = tasks.named('jar').get().archiveFile.get().asFile
        new java.util.zip.ZipFile(archive).withCloseable { jar ->
            contractArtifactEntries.each { entryName ->
                def entry = jar.getEntry(entryName)
                if (entry == null || entry.size == 0) {
                    throw new GradleException(
                            "Missing or empty connector contract artifact entry: ${entryName}")
                }
            }
            def aggregateEntry = jar.getEntry(aggregateCddlPath)
            def actual = jar.getInputStream(aggregateEntry).getText('UTF-8')
            def expectedBody = connectorCddlSources.collect { source ->
                source.getText('UTF-8').trim()
            }.join('\n\n')
            def expected = aggregateCddlHeader + expectedBody + '\n'
            if (actual != expected) {
                throw new GradleException(
                        'Published connectors-v1.cddl does not match its ordered source fragments')
            }
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyContractArtifact')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Integration Contracts'
                description = 'Provider-neutral wire contracts for first-party app-chain integration connectors'
            }
        }
    }
}
