dependencies {
    api project(':core-api')
    api project(':appchain-stdlib-contracts')
    implementation project(':appchain-config')

    implementation libs.cbor
    implementation libs.cardano.client.crypto
    implementation libs.slf4j.api

    testImplementation project(':runtime')
    testImplementation project(':appchain-client')
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Standard Library'
                description = 'Ready-to-use app-chain state machines (kv-registry, approvals, ...) for Yano'
            }
        }
    }
}
