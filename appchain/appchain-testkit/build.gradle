dependencies {
    api project(':runtime')
    api project(':appchain-integration-contracts')
    api libs.junit.jupiter.api

    implementation libs.cardano.client.crypto
    implementation libs.slf4j.api
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.named('compileJava') {
    // This module has no annotation processor that consumes the repository-wide
    // project identity option, so do not emit an irrelevant javac processing warning.
    options.compilerArgs.removeAll { it.startsWith('-Aproject=') }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Testkit'
                description = 'JUnit 5 extension for embedded multi-node app-chain clusters in application tests'
            }
        }
    }
}
