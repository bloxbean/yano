dependencies {
    api project(':runtime')
    api libs.junit.jupiter.api

    implementation libs.cardano.client.crypto
    implementation libs.slf4j.api
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yano App-Chain Testkit'
                description = 'JUnit 5 extension for embedded multi-node app-chain clusters in application tests'
            }
        }
    }
}
