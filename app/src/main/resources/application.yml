quarkus:
  application:
    name: yano
  package:
    output-name: yano
    jar:
      type: uber-jar
      add-runner-suffix: false
  http:
    port: 7070
    test-port: 0
  resteasy:
    path: ${yano.api-prefix:/api/v1}
  log:
    level: INFO
    category:
      "com.bloxbean.cardano.yaci":
        level: INFO
      "com.bloxbean.cardano.yaci.core.network.Session":
        # Peer dial failures are expected with public/discovered relay sets.
        # Yano logs the selected peer and root cause in one line at the sync layer.
        level: "OFF"
  smallrye-openapi:
    info-title: "Yano API"
    info-version: "${quarkus.application.version:0.1.0}"
    info-description: "Cardano Yano REST API"
  swagger-ui:
    always-include: ${YANO_SWAGGER_UI_ENABLED:true}
    path: /q/swagger-ui
  banner:
    enabled: true
    path: "banner.txt"

yaci:
  events:
    enabled: true
  plugins:
    enabled: true
    directory: plugins
    logging:
      enabled: false

yano:
  api-prefix: /api/v1
  network: preprod
  auto-sync-start: true
  client:
    enabled: true
  remote:
    host: preprod-node.world.dev.cardano.org
    port: 30000
    protocol-magic: 1
  upstream:
    validation:
      # Header validation: none | structural | header-signature | praos-lite | praos-ledger.
      # Disabled by default. header-signature checks structure, KES, and opcert signatures.
      # praos-lite additionally checks the Shelley+ VRF proof when epoch nonce tracking is available.
      # praos-ledger adds ledger-view checks and uses persisted opcert counters when available.
      level: none
      # Body validation presets are scaffolded for future validators. Supported now: none.
      body-level: none
      # Op-cert counter state: none | compat | strict.
      # none disables the op-cert counter stage by default.
      # compat checks persisted counters when present and skips missing counters for old/checkpointed DBs.
      # strict applies Haskell-style 0 for registered issuers without stored state.
      opcert-counter-mode: none
      # Validation start: immediate | era | checkpoint.
      # If mode=era and slot/hash are omitted, Yano starts validation when the era boundary is observed locally.
      # The packaged public-network profiles include verified first-Conway-block anchors where available.
      start:
        mode: era
        era: conway
        slot: 69638426
        hash: "ecde79b23e343becca15618fc26281ba1aaea2eb1b66ab8828d7a127f5dbc30f"
  relay:
    # Enables relay-style peer-sharing support on the N2N server. Keep disabled
    # unless the advertised endpoint is intentionally reachable by other nodes.
    auto-discovery: false
    # "auto" resolves a local non-loopback interface address. Set an
    # explicit public DNS/IP for production relay deployments.
    advertised-host: auto
    # 0 means use yano.server.port.
    advertised-port: 0
    allow-private-addresses: false
    connection:
      max-inbound-connections: 100
      max-connections-per-ip: 5
      # Bind outbound N2N dials to the local relay port when possible. If the
      # platform rejects a local bind for one dial, Yano falls back to an
      # OS-assigned source port for that dial.
      source-port-reuse: true
  tx:
    mempool:
      max-txs: 10000
      max-bytes: 134217728
      ttl-seconds: 10800
    diffusion:
      # Simple relay MVP switch. true maps to all-hot transaction diffusion.
      # Legacy yano.tx.diffusion.mode remains accepted for compatibility.
      enabled: true
      limits:
        max-in-flight-txs-per-peer: 100
        max-in-flight-bytes-per-peer: 1048576
        peer-cooldown-ms: 60000
  # App chain (parallel application ledger over the appmsg protocol).
  # See adr/app-layer/005-yano-app-chain-framework.md. Disabled by default.
  app-chain:
    enabled: false
    # chain-id: "my-app-chain"
    # signing-key: "<hex 32-byte Ed25519 seed>"           # this member's private key
    # members: "<hex pubkey1>,<hex pubkey2>"              # group member public keys
    # peers: "host1:13337,host2:13337"                    # app-group peers
    # max-message-bytes: 65536
    # max-ttl-seconds: 3600
    # default-ttl-seconds: 600
    # Sequenced ledger (omit sequencer.proposer for diffusion-only mode):
    # sequencer:
    #   proposer: "<hex pubkey of the fixed sequencer>"
    # threshold: 2                                        # finality cert n-of-members
    # block:
    #   interval-ms: 2000
    #   max-messages: 500
    # state-machine: ordered-log                          # built-in default app
    # L1 anchoring (metadata mode; anchor wallet must be funded):
    # anchor:
    #   enabled: true
    #   signing-key: "<hex 32-byte Ed25519 seed>"         # anchor wallet payment key
    #   every-blocks: 10
    #   max-interval-minutes: 60
    #   metadata-label: 7014
    # l1:
    #   stability-depth: 36                               # L1 ref depth in app blocks
  dns:
    cache:
      # Positive DNS cache TTL in seconds. Defaults to 60 when omitted.
      # Set to 0 to disable positive caching or -1 to cache forever.
      # ttl: 60
      # Negative DNS cache TTL in seconds. Defaults to 10 when omitted.
      # negative:
      #   ttl: 10
  server:
    enabled: true
    port: 13337
  storage:
    rocksdb: true
    path: "./chainstate"
  genesis:
    shelley-genesis-file: config/network/preprod/shelley-genesis.json
    shelley-genesis-hash: "162d29c4e1cf6b8a84f2d692e67a3ac6bc7851bc3e6e4afe64d15778bed8bd86"
    byron-genesis-file: config/network/preprod/byron-genesis.json
    alonzo-genesis-file: config/network/preprod/alonzo-genesis.json
    conway-genesis-file: config/network/preprod/conway-genesis.json
    protocol-parameters-file: config/network/preprod/protocol-param.json
  dev-mode: false
  account-state:
    enabled: true
    # epoch-block-data-retention-lag: 5    # epochs to keep per-block issuer/fee data after consumption (controls rollback depth)
    # snapshot-retention-epochs: 50        # epochs of delegation snapshots to retain
  # Optional umbrella rollback retention. When set, Yano fills missing rollback
  # retention properties for UTXO/account-state/account-history from genesis epoch length.
  # Explicit leaf properties still take precedence.
  # rollback-retention-epochs: 20
  account:
    stake-balance-index-enabled: true
  account-history:
    enabled: false
    tx-events-enabled: true
    rewards-enabled: false
    retention-epochs: 0
    # Defaults to yano.utxo.rollbackWindow when omitted.
    # rollback-safety-slots: 4320
    prune-interval-seconds: 300
    prune-batch-size: 50000
  epoch-snapshot:
    amounts-enabled: true
  adapot:
    enabled: true
  rewards:
    enabled: true
  epoch-params:
    tracking-enabled: true
  governance:
    enabled: true
  chain:
    block-body-prune-depth: 0          # blocks to retain (0 = disabled)
    block-prune-batch-size: 500000     # entries per prune pass
    block-prune-interval-seconds: 300
  filters:
    utxo:
      enabled: false
      addresses: []
      payment-credentials: []
  metrics:
    enabled: true
    sample:
      rocksdb:
        seconds: 30
  validation:
    default-validator-enabled: true
    # CCL "supplementary rules" (GOVCERT/governance/delegatee gap rules) layered on top of Scalus.
    # Disabled by default — they don't yet account for intra-tx state changes within a single block.
    # Set to true to opt in for testing.
    supplementary-rules-enabled: false
  utxo:
    prune:
      schedule:
        seconds: 5
    metrics:
      lag:
        logSeconds: 10
    lag:
      failIfAbove: -1
  block-producer:
    enabled: false
    block-time-millis: 0
    lazy: false
    genesis-timestamp: 0
    slot-length-millis: 0
    start-epoch: 0
    past-time-travel-mode: false
    past-time-travel-slot-leader-mode: false
    tx-evaluation: true

"%native":
  quarkus:
    package:
      jar:
        enabled: false
    native:
      enabled: true

