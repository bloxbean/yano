def nativeBuildArgsProperty = 'quarkus.native.additional-build-args'
def nativeContainerRuntimeOptionsProperty = 'quarkus.native.container-runtime-options'

def getNativeBuildArgs = {
    def raw = System.getProperty(nativeBuildArgsProperty)
    if (raw == null || raw.isBlank()) {
        return []
    }

    return raw.split(',')
            .collect { it.trim() }
            .findAll { !it.isBlank() }
}

def addNativeBuildArgs = { List<String> additions ->
    def args = getNativeBuildArgs()
    additions.each { arg ->
        if (!args.contains(arg)) {
            args.add(arg)
        }
    }

    if (!args.isEmpty()) {
        System.setProperty(nativeBuildArgsProperty, args.join(','))
    }
}

def getNativeContainerRuntimeOptions = {
    def raw = System.getProperty(nativeContainerRuntimeOptionsProperty)
    if (raw == null || raw.isBlank()) {
        return []
    }

    return raw.split(',')
            .collect { it.trim() }
            .findAll { !it.isBlank() }
}

def addNativeContainerRuntimeOptions = { List<String> additions ->
    def options = getNativeContainerRuntimeOptions()
    additions.each { option ->
        if (!options.contains(option)) {
            options.add(option)
        }
    }

    if (!options.isEmpty()) {
        System.setProperty(nativeContainerRuntimeOptionsProperty, options.join(','))
    }
}

def hasNativeContainerWorkdir = {
    def options = getNativeContainerRuntimeOptions()
    for (int i = 0; i < options.size(); i++) {
        def option = options[i]
        if (option == '-w' || option == '--workdir' || option.startsWith('-w=') || option.startsWith('--workdir=')) {
            return true
        }
    }

    return false
}

