def allocateLoopbackPorts = { int count ->
    if (count <= 0) {
        throw new IllegalArgumentException('loopback port count must be positive')
    }
    def address = java.net.InetAddress.getByName('127.0.0.1')
    def sockets = []
    try {
        count.times {
            sockets.add(new java.net.ServerSocket(0, 1, address))
        }
        return sockets.collect { it.localPort }
    } finally {
        sockets.reverseEach { it.close() }
    }
}

