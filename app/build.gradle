import org.gradle.api.artifacts.ProjectDependency
import org.gradle.api.artifacts.component.ModuleComponentIdentifier
import org.gradle.api.artifacts.component.ProjectComponentIdentifier
import org.gradle.api.artifacts.result.ResolvedDependencyResult

plugins {
    id 'application'
    id 'io.quarkus' version "${quarkusPluginVersion}"
}

def includeFirstPartyPluginBundlesProperty =
        providers.gradleProperty('includeFirstPartyPluginBundles').orNull
if (includeFirstPartyPluginBundlesProperty != null
        && !['true', 'false'].contains(includeFirstPartyPluginBundlesProperty.toLowerCase())) {
    throw new GradleException('includeFirstPartyPluginBundles must be true or false')
}
def includeFirstPartyPluginBundles =
        Boolean.parseBoolean(includeFirstPartyPluginBundlesProperty ?: 'false')
def jacksonPatchVersion = libs.versions.jackson.get()
def jacksonAnnotationsVersion = jacksonPatchVersion.replaceFirst(/\.\d+$/, '')
def isJacksonModule = { String group ->
    group == 'com.fasterxml.jackson' || group?.startsWith('com.fasterxml.jackson.')
}

// Quarkus owns the application logging provider. The standalone runtime's
// reload4j backend must not compete with Quarkus' JBoss provider in either the
// packaged application or its test classpath.
configurations.configureEach {
    exclude group: 'org.slf4j', module: 'slf4j-reload4j'
    exclude group: 'ch.qos.reload4j', module: 'reload4j'
    // Keep the Quarkus host and every opt-in connector on the same SLF4J API
    // patch even when first-party bundles are not included.
    resolutionStrategy.force(libs.slf4j.api.get())
    // Quarkus 3.33 is retained as the stable LTS baseline, but its enforced
    // platform selects the vulnerable Jackson 2.21.2 patch. Align every
    // Jackson family, not only databind, to the reviewed 2.21.4 BOM line.
    // jackson-annotations intentionally follows Jackson's official 2.21 BOM
    // convention and therefore has no patch component.
    resolutionStrategy.eachDependency { details ->
        if (isJacksonModule(details.requested.group)) {
            details.useVersion(details.requested.name == 'jackson-annotations'
                    ? jacksonAnnotationsVersion : jacksonPatchVersion)
            details.because('ADR-013 release image requires the fixed Jackson 2.21.4 family')
        }
    }
}

// Quarkus's enforced platform may select older Kafka/BC/AWS SDK versions than
// the first-party connectors. Opt-in thin/native connector builds must use the
// same security-reviewed versions as their self-contained JVM bundles.
if (includeFirstPartyPluginBundles) {
    configurations.configureEach {
        resolutionStrategy.force(
                libs.kafka.clients.get(),
                libs.bouncycastle.bcprov.get(),
                libs.lz4.java.get(),
                libs.snappy.java.get())
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'software.amazon.awssdk') {
                details.useVersion(
                        libs.aws.sdk.s3.get().versionConstraint.requiredVersion)
                details.because('use one security-reviewed AWS SDK line for first-party connectors')
            }
        }
    }
}
def includeNativePluginConformanceFixtureProperty =
        providers.gradleProperty('includeNativePluginConformanceFixture').orNull
if (includeNativePluginConformanceFixtureProperty != null
        && !['true', 'false'].contains(
                includeNativePluginConformanceFixtureProperty.toLowerCase())) {
    throw new GradleException(
            'includeNativePluginConformanceFixture must be true or false')
}
def includeNativePluginConformanceFixture = Boolean.parseBoolean(
        includeNativePluginConformanceFixtureProperty ?: 'false')
def declaredPluginManifestVersion = providers.gradleProperty('version').get()

// Every build-time bundle must have an explicit Gradle project root. Mappings
// with includeProvided also add non-annotation compileOnly dependencies because
// those are supplied by the host at execution time rather than by the bundle JAR.
def buildTimePluginBundles = [
        'com.bloxbean.cardano.yaci.plugins.logging':
                [projectPath: ':runtime', includeProvided: false,
                 expectedManifestVersion: '1.0.0'],
        'com.bloxbean.cardano.yano.appchain.stdlib':
                [projectPath: ':appchain-stdlib', includeProvided: false],
        'com.bloxbean.cardano.yano.appchain.composite':
                [projectPath: ':appchain-composite', includeProvided: false],
        'com.bloxbean.cardano.yano.appchain.evidence-registry':
                [projectPath: ':appchain-evidence-registry', includeProvided: true]
]
if (includeFirstPartyPluginBundles) {
    buildTimePluginBundles.putAll([
            'com.bloxbean.cardano.yano.appchain.kafka':
                    [projectPath: ':appchain-kafka', includeProvided: true],
            'com.bloxbean.cardano.yano.appchain.objectstore.s3':
                    [projectPath: ':appchain-objectstore-s3', includeProvided: true],
            'com.bloxbean.cardano.yano.appchain.ipfs':
                    [projectPath: ':appchain-ipfs', includeProvided: true],
            'com.bloxbean.cardano.yano.appchain.effects.cardano':
                    [projectPath: ':appchain-effects-cardano', includeProvided: true],
            'com.bloxbean.cardano.yano.appchain.zk':
                    [projectPath: ':appchain-zk', includeProvided: true]
    ])
}
if (includeNativePluginConformanceFixture) {
    buildTimePluginBundles.put(
            'com.bloxbean.cardano.yano.fixture.plugin-conformance',
            [projectPath: ':appchain-plugin-conformance', includeProvided: true])
}

def requireIndexedManifestVersions = { index, Map<String, String> expectedVersions ->
    expectedVersions.toSorted().each { bundleId, expectedVersion ->
        def bundle = index.bundles.find { it.manifest?.id == bundleId }
        if (bundle == null) {
            throw new GradleException(
                    "Expected build-time plugin bundle ${bundleId} is absent from the index")
        }
        def actualVersion = bundle.manifest.version?.toString()
        if (actualVersion != expectedVersion) {
            throw new GradleException(
                    "Plugin bundle ${bundleId} manifest version ${actualVersion} "
                            + "does not match expected version ${expectedVersion}")
        }
    }
}

dependencies {
    implementation enforcedPlatform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")

    // Quarkus dependencies
    implementation 'io.quarkus:quarkus-resteasy'
    implementation 'io.quarkus:quarkus-resteasy-jackson'
    implementation 'io.quarkus:quarkus-arc'
    implementation 'io.quarkus:quarkus-config-yaml'
    implementation 'io.quarkus:quarkus-smallrye-health'
    implementation 'io.quarkus:quarkus-smallrye-openapi'

    // Yano module dependencies
    implementation(project(':core-api')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    implementation(project(':runtime')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    implementation(project(':devnet-toolkit')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    implementation(project(':bootstrap-providers')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    implementation(project(':tx-services')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    implementation(project(':epoch-export')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    // App-chain standard library (kv-registry, approvals, ...) — T2 optional,
    // activated only by selecting a machine id via yano.app-chain.state-machine
    implementation(project(':appchain-stdlib')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    // Stock deterministic composition and evidence-v1 preset (ADR-013.2).
    implementation(project(':appchain-composite')) {
        exclude group: 'io.netty', module: 'netty-all'
    }
    // Optional T3 integrations stay out of the stock artifact. Native/custom
    // builds can opt in before catalog-index and reflection generation.
    if (includeFirstPartyPluginBundles) {
        runtimeOnly project(':appchain-kafka')
        runtimeOnly project(':appchain-objectstore-s3')
        runtimeOnly project(':appchain-ipfs')
        runtimeOnly project(':appchain-effects-cardano')
        runtimeOnly project(':appchain-zk')
        // AWS SDK 2.48.0 compiles its checksum fallback against these optional
        // CRT types. A JVM can defer the absent branch, but native-image links
        // every reachable checksum implementation and therefore requires the
        // SDK-aligned artifact. Keep it host-only: the directory-loaded S3
        // bundle continues to use the pure-Java URLConnection path.
        runtimeOnly libs.aws.crt
    }
    if (includeNativePluginConformanceFixture) {
        runtimeOnly project(':appchain-plugin-conformance')
    }

    // App-chain metrics (ADR 006 E5.1); Prometheus endpoint at /q/metrics
    implementation 'io.quarkus:quarkus-micrometer-registry-prometheus'

    implementation("com.google.auto.service:auto-service:1.1.1")

    annotationProcessor libs.yaci.events.processor
    annotationProcessor "com.google.auto.service:auto-service:1.1.1"

    compileOnly libs.lombok
    annotationProcessor libs.lombok

    testImplementation 'io.quarkus:quarkus-junit'
    testImplementation 'io.rest-assured:rest-assured'

    testImplementation project(':testkit')
    testImplementation libs.cardano.client.lib
    testImplementation libs.cardano.client.backend.blockfrost
    testImplementation libs.cardano.client.quicktx
    testImplementation libs.cardano.client.cip20
}

application {
    mainClass = 'io.quarkus.runner.GeneratedMain'
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

// Disable default application plugin dist tasks (incompatible with Quarkus)
distZip.enabled = false
distTar.enabled = false
startScripts.enabled = false

test {
    systemProperty 'yano.test.include-first-party-plugin-bundles',
            Boolean.toString(includeFirstPartyPluginBundles)
    systemProperty 'yano.test.include-native-plugin-conformance-fixture',
            Boolean.toString(includeNativePluginConformanceFixture)
    useJUnitPlatform {
        excludeTags 'integration', 'e2e', 'haskell-sync'
    }
}

// ADR-011.2: preserve artifact ownership before Quarkus flattens dependencies.
def generatedPluginCatalogDir = layout.buildDirectory.dir('generated/plugin-catalog-resources')
def generatedPluginReflectionPath =
        'META-INF/native-image/com.bloxbean.cardano/yano-plugin-catalog/reflect-config.json'
sourceSets.main.resources.srcDir(generatedPluginCatalogDir)

// RESTEasy fixes its application path during Quarkus augmentation. Generate a
// tiny immutable marker and the config source that drives that build-time path
// from the same canonical value. A packaged process may still receive
// yano.api-prefix at launch, but the application guard rejects any value that
// differs from this artifact contract before node/plugin startup.
def generatedApiPrefixDir = layout.buildDirectory.dir('generated/api-prefix-resources')
def bakedApiPrefixMarkerPath = 'META-INF/yano-api-prefix-v1'
def bakedApiPrefixConfigPath = 'application.properties'
def bakedApiPrefixDashboardPath = 'META-INF/resources/ui/plugins/api-prefix.json'
def maxBakedApiPrefixLength = 256
def forbiddenApiPrefixBuildInputs = [
        providers.systemProperty('yano.api-prefix').isPresent(),
        providers.environmentVariable('YANO_API_PREFIX').isPresent(),
        providers.systemProperty('quarkus.resteasy.path').isPresent(),
        providers.environmentVariable('QUARKUS_RESTEASY_PATH').isPresent(),
        providers.systemProperty('quarkus.http.root-path').isPresent(),
        providers.environmentVariable('QUARKUS_HTTP_ROOT_PATH').isPresent()
]
if (forbiddenApiPrefixBuildInputs.any { it }) {
    throw new GradleException(
            'Runtime API-prefix configuration must not influence artifact augmentation; '
                    + 'unset yano.api-prefix/YANO_API_PREFIX and '
                    + 'Quarkus REST/root-path overrides, then use '
                    + '-PyanoApiPrefix=<path>')
}
def requestedBuildApiPrefix = providers.gradleProperty('yanoApiPrefix')
        .orElse('/api/v1')
def canonicalApiPrefix = { Object value ->
    String prefix = value.toString()
    if (prefix.length() > maxBakedApiPrefixLength
            || prefix.trim() != prefix
            || !prefix.startsWith('/')
            || (prefix.length() > 1 && prefix.endsWith('/'))
            || !(prefix ==~ /\/(?:[A-Za-z0-9._~-]+(?:\/[A-Za-z0-9._~-]+)*)?/)
            || prefix.split('/', -1).any { it == '.' || it == '..' }) {
        throw new GradleException(
                'yanoApiPrefix must be at most 256 characters and a '
                        + 'canonical absolute path '
                        + 'made of unescaped URI path segments')
    }
    prefix
}
def bakedApiPrefix = providers.provider {
    canonicalApiPrefix(requestedBuildApiPrefix.get())
}
sourceSets.main.resources.srcDir(generatedApiPrefixDir)

tasks.register('generateBakedApiPrefixContract') {
    inputs.property('apiPrefix', bakedApiPrefix)
    outputs.file(generatedApiPrefixDir.map { it.file(bakedApiPrefixMarkerPath) })
    outputs.file(generatedApiPrefixDir.map { it.file(bakedApiPrefixConfigPath) })
    outputs.file(generatedApiPrefixDir.map { it.file(bakedApiPrefixDashboardPath) })

    doLast {
        String prefix = bakedApiPrefix.get()

        def outputRoot = generatedApiPrefixDir.get()
        def marker = outputRoot.file(bakedApiPrefixMarkerPath).asFile
        marker.parentFile.mkdirs()
        marker.setText(prefix + System.lineSeparator(), 'UTF-8')

        def config = outputRoot.file(bakedApiPrefixConfigPath).asFile
        config.parentFile.mkdirs()
        config.setText('quarkus.http.root-path=/' + System.lineSeparator()
                + 'quarkus.resteasy.path=' + prefix + System.lineSeparator()
                + 'yano.api-prefix=' + prefix + System.lineSeparator()
                + 'quarkus.config.build-time-mismatch-at-runtime=fail'
                + System.lineSeparator(), 'UTF-8')

        def dashboard = outputRoot.file(bakedApiPrefixDashboardPath).asFile
        dashboard.parentFile.mkdirs()
        dashboard.setText(groovy.json.JsonOutput.toJson([apiPrefix: prefix])
                + System.lineSeparator(), 'UTF-8')
    }
}

tasks.register('generatePluginCatalogIndex', JavaExec) {
    dependsOn project(':plugin-catalog').tasks.named('classes')
    inputs.files(configurations.runtimeClasspath)
    outputs.file(generatedPluginCatalogDir.map {
        it.file('META-INF/yano-plugin-index-v1.json')
    })
    outputs.file(generatedPluginCatalogDir.map {
        it.file(generatedPluginReflectionPath)
    })
    // Closure ownership comes from resolution-graph edges, not only the global
    // runtime file set. Always regenerate so an edge reassignment with the same
    // artifact bytes cannot reuse stale per-bundle evidence.
    outputs.upToDateWhen { false }
    outputs.doNotCacheIf('per-bundle resolution-graph ownership is execution input') { true }
    classpath = project(':plugin-catalog').sourceSets.main.runtimeClasspath
    mainClass = 'com.bloxbean.cardano.yano.catalog.PluginIndexGenerator'
    doFirst {
        def output = generatedPluginCatalogDir.get()
                .file('META-INF/yano-plugin-index-v1.json').asFile
        output.parentFile.mkdirs()
        def runtimeConfiguration = configurations.runtimeClasspath
        def artifactResults = runtimeConfiguration.incoming.artifactView { }.artifacts.artifacts
        def artifacts = artifactResults.collect { it.file }
                .findAll { it.exists() }
                .sort { left, right -> left.absolutePath <=> right.absolutePath }
        def components = runtimeConfiguration.incoming.resolutionResult.allComponents
        def artifactsByComponent = artifactResults.groupBy { it.id.componentIdentifier }

        def projectComponent = { String projectPath ->
            def component = components.find { candidate ->
                candidate.id instanceof ProjectComponentIdentifier
                        && candidate.id.projectPath == projectPath
            }
            if (component == null) {
                throw new GradleException("Build-time plugin project ${projectPath} "
                        + 'is absent from app runtimeClasspath')
            }
            component
        }
        def moduleComponent = { String group, String module ->
            def component = components.find { candidate ->
                candidate.id instanceof ModuleComponentIdentifier
                        && candidate.id.group == group
                        && candidate.id.module == module
            }
            if (component == null) {
                throw new GradleException("Provided plugin dependency ${group}:${module} "
                        + 'is absent from app runtimeClasspath')
            }
            component
        }
        def componentClosureFiles = { Collection roots ->
            def pending = new ArrayDeque(roots)
            def visited = [] as Set
            while (!pending.isEmpty()) {
                def component = pending.removeFirst()
                if (!visited.add(component.id)) {
                    continue
                }
                component.dependencies.findAll {
                    it instanceof ResolvedDependencyResult
                }.each { dependency -> pending.addLast(dependency.selected) }
            }
            visited.collectMany { componentId ->
                (artifactsByComponent[componentId] ?: []).collect { it.file }
            }.toSet().toList().sort { left, right ->
                left.absolutePath <=> right.absolutePath
            }
        }

        def arguments = ['--output', output.absolutePath, '--strict-bundle-closures']
        buildTimePluginBundles.toSorted().each { bundleId, specification ->
            def roots = [projectComponent(specification.projectPath)]
            if (specification.includeProvided) {
                project(specification.projectPath).configurations.compileOnly.dependencies
                        .findAll { dependency -> dependency.name != 'lombok' }
                        .each { dependency ->
                            if (dependency instanceof ProjectDependency) {
                                roots.add(projectComponent(dependency.path))
                            } else {
                                roots.add(moduleComponent(dependency.group, dependency.name))
                            }
                        }
            }
            def closureFiles = componentClosureFiles(roots)
            if (closureFiles.isEmpty()) {
                throw new GradleException(
                        "Build-time plugin ${bundleId} has an empty artifact closure")
            }
            closureFiles.each { file ->
                arguments.addAll(['--bundle-closure', bundleId, file.absolutePath])
            }
        }
        arguments.add('--')
        arguments.addAll(artifacts.collect { it.absolutePath })
        args = arguments
    }
    doLast {
        def outputRoot = generatedPluginCatalogDir.get()
        def indexFile = outputRoot.file('META-INF/yano-plugin-index-v1.json').asFile
        def index = new groovy.json.JsonSlurper().parse(indexFile)
        def expectedVersions = buildTimePluginBundles.collectEntries { bundleId, specification ->
            [(bundleId): (specification.expectedManifestVersion
                    ?: declaredPluginManifestVersion)]
        }
        requireIndexedManifestVersions(index, expectedVersions)
        def providerNames = [] as Set
        index.bundles.each { bundle ->
            bundle.manifest.contributions.each { contribution ->
                providerNames.add(contribution.provider)
            }
        }
        index.legacyProviders.each { provider -> providerNames.add(provider.provider) }
        def reflectionEntries = providerNames.toList().sort().collect { provider ->
            [name: provider, allDeclaredConstructors: true]
        }
        def reflectionFile = outputRoot.file(generatedPluginReflectionPath).asFile
        reflectionFile.parentFile.mkdirs()
        reflectionFile.setText(groovy.json.JsonOutput.toJson(reflectionEntries), 'UTF-8')
    }
}

tasks.named('processResources') {
    dependsOn tasks.named('generatePluginCatalogIndex'),
            tasks.named('generateBakedApiPrefixContract')
}

tasks.register('verifyFirstPartyPluginBundles', JavaExec) {
    dependsOn rootProject.tasks.named('verifyAdr013JacksonAlignment'),
            rootProject.tasks.named('verifyAdr013Slf4jAlignment')
    dependsOn ':appchain-kafka:verifyKafkaArtifactBoundaries',
            ':appchain-objectstore-s3:verifyObjectStoreS3ArtifactBoundaries',
            ':appchain-ipfs:verifyIpfsArtifactBoundaries',
            ':appchain-evidence-registry:verifyEvidenceRegistryArtifactBoundaries',
            ':appchain-effects-cardano:shadowJar', ':appchain-zk:shadowJar'
    def verificationIndex = layout.buildDirectory.file(
            'reports/plugin-catalog/first-party-bundles.json')
    inputs.files({
        [project(':appchain-kafka'), project(':appchain-objectstore-s3'),
         project(':appchain-ipfs'),
         project(':appchain-evidence-registry'),
         project(':appchain-effects-cardano'),
         project(':appchain-zk')].collect { pluginProject ->
            pluginProject.tasks.named('shadowJar').get().archiveFile.get().asFile
        }
    })
    // The verification below also asserts the versions selected on the host
    // runtime classpath. Track that classpath as an input so a BOM, force, or
    // dependency change cannot leave an UP-TO-DATE report with stale results.
    inputs.files(configurations.runtimeClasspath)
    outputs.file(verificationIndex)
    classpath = project(':plugin-catalog').sourceSets.main.runtimeClasspath
    mainClass = 'com.bloxbean.cardano.yano.catalog.PluginIndexGenerator'
    doFirst {
        def bundleFiles = [
                project(':appchain-kafka'),
                project(':appchain-objectstore-s3'),
                project(':appchain-ipfs'),
                project(':appchain-evidence-registry'),
                project(':appchain-effects-cardano'),
                project(':appchain-zk')
        ].collect { pluginProject ->
            pluginProject.tasks.named('shadowJar').get().archiveFile.get().asFile
        }.sort { left, right -> left.absolutePath <=> right.absolutePath }
        def output = verificationIndex.get().asFile
        output.parentFile.mkdirs()
        args = ['--output', output.absolutePath] + bundleFiles.collect { it.absolutePath }
    }
    doLast {
        def index = new groovy.json.JsonSlurper().parse(verificationIndex.get().asFile)
        requireIndexedManifestVersions(index, [
                'com.bloxbean.cardano.yano.appchain.kafka': declaredPluginManifestVersion,
                'com.bloxbean.cardano.yano.appchain.objectstore.s3':
                        declaredPluginManifestVersion,
                'com.bloxbean.cardano.yano.appchain.ipfs':
                        declaredPluginManifestVersion,
                'com.bloxbean.cardano.yano.appchain.evidence-registry':
                        declaredPluginManifestVersion,
                'com.bloxbean.cardano.yano.appchain.effects.cardano':
                        declaredPluginManifestVersion,
                'com.bloxbean.cardano.yano.appchain.zk': declaredPluginManifestVersion
        ])
        def kafkaBundle = index.bundles.find {
            it.manifest?.id == 'com.bloxbean.cardano.yano.appchain.kafka'
        }
        def kafkaContributions = kafkaBundle?.manifest?.contributions?.collect {
            "${it.kind}:${it.name}"
        }?.toSet()
        if (kafkaContributions != Set.of(
                'finalized-sink:kafka', 'effect-executor:kafka')) {
            throw new GradleException(
                    "Kafka bundle contribution inventory is incomplete: ${kafkaContributions}")
        }
        def objectStoreBundle = index.bundles.find {
            it.manifest?.id == 'com.bloxbean.cardano.yano.appchain.objectstore.s3'
        }
        def objectStoreContributions = objectStoreBundle?.manifest?.contributions?.collect {
            "${it.kind}:${it.name}"
        }?.toSet()
        if (objectStoreContributions != Set.of('effect-executor:objectstore-s3')) {
            throw new GradleException(
                    "Object-store bundle contribution inventory is incomplete: "
                            + objectStoreContributions)
        }
        def ipfsBundle = index.bundles.find {
            it.manifest?.id == 'com.bloxbean.cardano.yano.appchain.ipfs'
        }
        def ipfsContributions = ipfsBundle?.manifest?.contributions?.collect {
            "${it.kind}:${it.name}"
        }?.toSet()
        if (ipfsContributions != Set.of('effect-executor:ipfs')) {
            throw new GradleException(
                    "IPFS bundle contribution inventory is incomplete: ${ipfsContributions}")
        }
        def evidenceBundle = index.bundles.find {
            it.manifest?.id == 'com.bloxbean.cardano.yano.appchain.evidence-registry'
        }
        def evidenceContributions = evidenceBundle?.manifest?.contributions?.collect {
            "${it.kind}:${it.name}"
        }?.toSet()
        if (evidenceContributions != Set.of(
                'app-state-machine:evidence-registry',
                'domain-api:com.bloxbean.cardano.yano.appchain.evidence-registry')) {
            throw new GradleException(
                    "Evidence-registry bundle contribution inventory is incomplete: "
                            + evidenceContributions)
        }
        if (includeFirstPartyPluginBundles) {
            def expectedRuntimeVersions = [
                    'org.apache.kafka:kafka-clients':
                            libs.kafka.clients.get().versionConstraint.requiredVersion,
                    'org.bouncycastle:bcprov-jdk18on':
                            libs.bouncycastle.bcprov.get().versionConstraint.requiredVersion,
                    'at.yawk.lz4:lz4-java':
                            libs.lz4.java.get().versionConstraint.requiredVersion,
                    'org.xerial.snappy:snappy-java':
                            libs.snappy.java.get().versionConstraint.requiredVersion,
                    'org.slf4j:slf4j-api':
                            libs.slf4j.api.get().versionConstraint.requiredVersion,
                    'software.amazon.awssdk:s3':
                            libs.aws.sdk.s3.get().versionConstraint.requiredVersion,
                    'software.amazon.awssdk:url-connection-client':
                            libs.aws.sdk.url.connection.client.get()
                                    .versionConstraint.requiredVersion,
                    'software.amazon.awssdk.crt:aws-crt':
                            libs.aws.crt.get().versionConstraint.requiredVersion
            ]
            def appRuntimeClasspath = project.configurations.getByName('runtimeClasspath')
            def resolvedRuntimeVersions = appRuntimeClasspath.incoming
                    .resolutionResult.allComponents.findAll { component ->
                component.id instanceof ModuleComponentIdentifier
            }.collectEntries { component ->
                def id = component.id as ModuleComponentIdentifier
                [("${id.group}:${id.module}".toString()): id.version]
            }
            expectedRuntimeVersions.each { module, expectedVersion ->
                def actualVersion = resolvedRuntimeVersions[module]
                if (actualVersion != expectedVersion) {
                    throw new GradleException(
                            "First-party plugin runtime resolved ${module}:${actualVersion}; "
                                    + "expected security-reviewed version ${expectedVersion}")
                }
            }
            def expectedAwsVersion = libs.aws.sdk.s3.get()
                    .versionConstraint.requiredVersion
            def mixedAwsModules = resolvedRuntimeVersions.findAll { module, version ->
                module.startsWith('software.amazon.awssdk:')
                        && version != expectedAwsVersion
            }
            if (!mixedAwsModules.isEmpty()) {
                throw new GradleException(
                        "First-party plugin runtime mixes AWS SDK versions: ${mixedAwsModules}")
            }
        }
    }
}

tasks.register('launchFirstPartyPluginBundles', JavaExec) {
    dependsOn tasks.named('testClasses'), ':appchain-kafka:shadowJar',
            ':appchain-objectstore-s3:shadowJar',
            ':appchain-ipfs:shadowJar',
            ':appchain-evidence-contracts:jar',
            ':appchain-evidence-registry:shadowJar',
            ':appchain-effects-cardano:shadowJar', ':appchain-zk:shadowJar'
    // Deliberately omit app.runtimeClasspath: the probe must prove the bundle
