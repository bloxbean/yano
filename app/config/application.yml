quarkus:
  http:
    port: 7072
  log:
    file:
      enable: true
      path: ./logs/yano-preprod-static-multi.log
    category:
      "com.bloxbean.cardano.yaci.core.network.Session":
        level: "OFF"
      "com.bloxbean.cardano.yano.runtime.sync.validation.HeaderValidationPipeline":
        level: "DEBUG"

yano:
  network: preprod
  auto-sync-start: true
  client:
    enabled: true

#    remote:
#      host: preprod-node.world.dev.cardano.org
#      port: 30000
#      protocol-magic: 1

  server:
    enabled: true
    port: 13338

  relay:
    auto-discovery: true
    advertised-host: ""
    advertised-port: 13338
    allow-private-addresses: true
    connection:
      max-inbound-connections: 100
      max-connections-per-ip: 5
      source-port-reuse: true

  storage:
    rocksdb: true
    path: ./chainstate-preprod-static-multi

  upstream:
    mode: p2p-relay
    peers:
      - id: iog-preprod
        host: preprod-node1.world.dev.cardano.org
        port: 30000
        trust: trusted
        priority: 0
    sync:
      fan-in-start: always
    discovery:
      enabled: true
      peer-sharing: true
      seeds: []
      topology-file: ""
      peer-snapshot-urls:
        - https://book.play.dev.cardano.org/environments/preprod/peer-snapshot.json
      peer-snapshot-limit: 32
      ledger-peers: false
      use-ledger-after-slot: -1
      allow-private-addresses: false
    selection:
      policy: trusted-or-quorum-within-rollback-window
      quorum: 2
      tie-break: deterministic
    validation:
      level: header-signature
      body-level: none
    governor:
      enabled: true
      targets:
        cold: 150
        warm: 8
        hot: 3
      max-concurrent-dials: 4
  tx:
    mempool:
      max-txs: 10000
      max-bytes: 134217728
      ttl-seconds: 10800
    diffusion:
      enabled: true
      limits:
        max-in-flight-txs-per-peer: 100
        max-in-flight-bytes-per-peer: 1048576
        peer-cooldown-ms: 60000
