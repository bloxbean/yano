plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id 'org.unbroken-dome.test-sets' version("4.1.0")
    id 'org.ajoberstar.grgit' version '5.2.0'
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'
    id 'com.gradleup.shadow' version '9.4.1' apply false
}

repositories {
    mavenCentral()
    mavenLocal()
    maven {
        url "https://central.sonatype.com/repository/maven-snapshots/"
    }
}

compileJava {
    sourceCompatibility = '25'
    targetCompatibility = '25'

    options.compilerArgs += ["-Aproject=${project.group}/${project.name}"]
}


dependencies {
    api project(':core-api')
    api project(':runtime')
}

test {
    useJUnitPlatform()
    jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
}

// Run every test task on the JUnit Platform; individual modules select their
// compatible Jupiter engine version.
tasks.withType(Test) {
    useJUnitPlatform()
}

// ADR-013 ships the Quarkus host, a standalone evidence runner, and six
// independently loadable plugin bundles. Keep the Jackson security override
// observable at build time: a direct catalog upgrade is not enough because
// Quarkus imports its platform as an enforced BOM.
def adr013ReleaseScopes = [
        app: ':app',
        runner: ':appchain-evidence-demo-runner',
        'bundle-kafka': ':appchain-kafka',
        'bundle-objectstore-s3': ':appchain-objectstore-s3',
        'bundle-ipfs': ':appchain-ipfs',
        'bundle-evidence-registry': ':appchain-evidence-registry',
        'bundle-effects-cardano': ':appchain-effects-cardano',
        'bundle-zk': ':appchain-zk'
]

tasks.register('verifyAdr013JacksonAlignment') {
    group = 'verification'
    description = 'Rejects vulnerable or mixed Jackson versions in ADR-013 runtime closures'

    doLast {
        def expectedPatchVersion = libs.versions.jackson.get()
        def expectedAnnotationsVersion = expectedPatchVersion.replaceFirst(/\.\d+$/, '')
        def expectedAppModules = [
                'com.fasterxml.jackson:jackson-bom',
                'com.fasterxml.jackson.core:jackson-annotations',
                'com.fasterxml.jackson.core:jackson-core',
                'com.fasterxml.jackson.core:jackson-databind',
                'com.fasterxml.jackson.dataformat:jackson-dataformat-cbor',
                'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml',
                'com.fasterxml.jackson.datatype:jackson-datatype-jdk8',
                'com.fasterxml.jackson.datatype:jackson-datatype-jsr310',
                'com.fasterxml.jackson.jakarta.rs:jackson-jakarta-rs-base',
                'com.fasterxml.jackson.jakarta.rs:jackson-jakarta-rs-json-provider',
                'com.fasterxml.jackson.module:jackson-module-jakarta-xmlbind-annotations',
                'com.fasterxml.jackson.module:jackson-module-parameter-names'
        ] as Set
        def reportLines = ['scope\tmodule\tversion']
        def failures = []

        adr013ReleaseScopes.each { scope, projectPath ->
            def targetProject = project(projectPath)
            def runtimeClasspath = targetProject.configurations
                    .getByName('runtimeClasspath')
            def modules = runtimeClasspath.incoming.resolutionResult.allComponents
                    .findAll { component ->
                        component.id instanceof
                                org.gradle.api.artifacts.component.ModuleComponentIdentifier
                                && (component.id.group == 'com.fasterxml.jackson'
                                || component.id.group.startsWith('com.fasterxml.jackson.'))
                    }.collectEntries { component ->
                        def id = component.id as
                                org.gradle.api.artifacts.component.ModuleComponentIdentifier
                        [("${id.group}:${id.module}".toString()): id.version]
                    }
            modules.toSorted().each { module, version ->
                reportLines.add("${scope}\t${module}\t${version}".toString())
                def expected = module ==
                        'com.fasterxml.jackson.core:jackson-annotations'
                        ? expectedAnnotationsVersion : expectedPatchVersion
                if (version != expected) {
                    failures.add("${scope} resolves ${module}:${version}; expected ${expected}")
                }
            }
            if (scope == 'app') {
                def missing = expectedAppModules - modules.keySet()
                if (!missing.isEmpty()) {
                    failures.add("app Jackson module inventory is incomplete: ${missing.sort()}")
                }
            }
        }

        def report = layout.buildDirectory.file(
                'reports/adr013/jackson-alignment.tsv').get().asFile
        report.parentFile.mkdirs()
        report.setText(reportLines.join(System.lineSeparator())
                + System.lineSeparator(), 'UTF-8')
        if (!failures.isEmpty()) {
            throw new GradleException('ADR-013 Jackson alignment failed:\n - '
                    + failures.join('\n - '))
        }
        logger.lifecycle('ADR-013 Jackson alignment passed for {} resolved modules; report={}',
                reportLines.size() - 1, report)
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyAdr013JacksonAlignment')
}

tasks.register('verifyAdr013Slf4jAlignment') {
    group = 'verification'
    description = 'Rejects mixed SLF4J APIs or bundled providers in ADR-013 runtime closures'

    doLast {
        def expectedVersion = libs.slf4j.api.get().versionConstraint.requiredVersion
        def expectedModules = ['org.slf4j:slf4j-api'] as Set
        def reportLines = ['scope\tmodule\tversion']
        def failures = []

        adr013ReleaseScopes.each { scope, projectPath ->
            def runtimeClasspath = project(projectPath).configurations
                    .getByName('runtimeClasspath')
            def modules = runtimeClasspath.incoming.resolutionResult.allComponents
                    .findAll { component ->
                        component.id instanceof
                                org.gradle.api.artifacts.component.ModuleComponentIdentifier
                                && component.id.group == 'org.slf4j'
                    }.collectEntries { component ->
                        def id = component.id as
                                org.gradle.api.artifacts.component.ModuleComponentIdentifier
                        [("${id.group}:${id.module}".toString()): id.version]
                    }
            modules.toSorted().each { module, version ->
                reportLines.add("${scope}\t${module}\t${version}".toString())
                if (version != expectedVersion) {
                    failures.add("${scope} resolves ${module}:${version}; expected ${expectedVersion}")
                }
            }
            if (modules.keySet() != expectedModules) {
                failures.add("${scope} SLF4J runtime inventory is ${modules.keySet().sort()}; "
                        + "expected host-provided API only ${expectedModules}")
            }
        }

        def report = layout.buildDirectory.file(
                'reports/adr013/slf4j-alignment.tsv').get().asFile
        report.parentFile.mkdirs()
        report.setText(reportLines.join(System.lineSeparator())
                + System.lineSeparator(), 'UTF-8')
        if (!failures.isEmpty()) {
            throw new GradleException('ADR-013 SLF4J alignment failed:\n - '
                    + failures.join('\n - '))
        }
        logger.lifecycle('ADR-013 SLF4J alignment passed for {} runtime closures; report={}',
                adr013ReleaseScopes.size(), report)
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyAdr013Slf4jAlignment')
}

ext.ossrhUsername = System.getenv('MAVEN_USERNAME')
ext.ossrhPassword = System.getenv('MAVEN_PASSWORD')

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name = 'yano'
                description = 'Yano - A Cardano Node implementation in Java built on Yaci'
                url = 'https://github.com/bloxbean/yano'
                licenses {
                    license {
                        name = 'The MIT License'
                        url = 'https://opensource.org/licenses/mit-license.php'
                    }
                }
                developers {
                    developer {
                        id = 'satran004'
                        name = 'Satya'
                    }
                }
                scm {
                    connection = 'scm:git:git://github.com/bloxbean/yano.git'
                    developerConnection = 'scm:git:ssh://git@github.com/bloxbean/yano.git'
                    url = 'https://github.com/bloxbean/yano'
                }
            }
        }
    }

    repositories {
        maven {
            def releasesRepoUrl = "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/"
            def snapshotsRepoUrl = "https://central.sonatype.com/repository/maven-snapshots/"
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
            credentials {
                username ossrhUsername
                password ossrhPassword
            }
        }
    }
}

nexusPublishing {
    repositories {
        sonatype {
            nexusUrl.set(uri("https://ossrh-staging-api.central.sonatype.com/service/local/"))
            snapshotRepositoryUrl.set(uri("https://central.sonatype.com/repository/maven-snapshots/"))
            username = ossrhUsername
            password = ossrhPassword
        }
    }
}

ext.isReleaseVersion = !version.endsWith("SNAPSHOT")

if (isReleaseVersion && !project.hasProperty("skipSigning")) {
    signing {
//        sign configurations.archives
        sign publishing.publications
    }
}

def commit_id=getCheckedOutGitCommitHash()
if (commit_id && project.version.endsWith("-SNAPSHOT")) {
    version = "${project.version}".replace("-SNAPSHOT", "-${commit_id}-SNAPSHOT")
}

def nonLibraryModules = ['app', 'console-ui'] as Set

subprojects {
    // Skip most configuration for application modules (Quarkus/Scala handle their own builds)
    if (!(project.name in nonLibraryModules)) {
        apply plugin: 'java-library'
        apply plugin: 'maven-publish'
        apply plugin: 'signing'
        apply plugin: 'org.unbroken-dome.test-sets'
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url "https://central.sonatype.com/repository/maven-snapshots/"
        }
    }

    // def commit_id=getCheckedOutGitCommitHash()
    if (commit_id && project.version.endsWith("-SNAPSHOT")) {
        version = "${project.version}".replace("-SNAPSHOT", "-${commit_id}-SNAPSHOT")
    }

    // Only configure library-specific settings for non-application modules
    if (!(project.name in nonLibraryModules)) {
        //Jars are with yano prefix
        tasks.named('jar') {
            archiveBaseName = 'yano-' + project.name
        }
        dependencies {
            api libs.slf4j.api

            compileOnly libs.lombok
            annotationProcessor libs.lombok

            testImplementation libs.junit.jupiter.api
            testRuntimeOnly libs.junit.jupiter.engine
            testRuntimeOnly libs.junit.platform.launcher
            testImplementation libs.harmcrest.library
            testImplementation libs.mockito.inline
            testImplementation libs.mockito.junit.jupiter
            testImplementation libs.assertj.core
            testRuntimeOnly libs.slf4j.reload4j

            testCompileOnly libs.lombok
            testAnnotationProcessor libs.lombok
        }

        compileJava {
            sourceCompatibility = '25'
            targetCompatibility = '25'

            options.compilerArgs += ["-Aproject=${project.group}/${project.name}"]
        }

        tasks.withType(Javadoc) {
            options.encoding = 'UTF-8'
        }

        task sourceJar(type: Jar) {
            archiveClassifier = "sources"
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
            from sourceSets.main.allJava
        }

        task javadocJar(type: Jar, dependsOn: javadoc) {
            archiveClassifier = "javadoc"
            from javadoc.destinationDir
        }

        testSets {
            integrationTest
        }

        publishing {
            publications {
                mavenJava(MavenPublication) {
                    from components.java
                    artifact(sourceJar) {
                        classifier = 'sources'
                    }
                    artifact(javadocJar) {
                        classifier = 'javadoc'
                    }

                    artifactId 'yano-' + project.name
                    pom {
                        url = 'https://github.com/bloxbean/yano'
                        licenses {
                            license {
                                name = 'The MIT License'
                                url = 'https://opensource.org/licenses/mit-license.php'
                            }
                        }
                        developers {
                            developer {
                                id = 'satran004'
                                name = 'Satya'
                            }
                        }
                        scm {
                            connection = 'scm:git:git://github.com/bloxbean/yano.git'
                            developerConnection = 'scm:git:ssh://git@github.com/bloxbean/yano.git'
                            url = 'https://github.com/bloxbean/yano'
                        }
                    }
                }
            }
        }

        ext.isReleaseVersion = !version.endsWith("SNAPSHOT")

        if (isReleaseVersion && !project.hasProperty("skipSigning")) {
            signing {
                sign publishing.publications
            }
        }
    }

    // Make all tests use JUnit 5 (for all modules including application)
    tasks.withType(Test) {
        useJUnitPlatform()
        jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
        testLogging {
            events "started", "passed", "skipped", "failed"
            exceptionFormat "full"
            showStandardStreams = true
        }

    }
}

def getCheckedOutGitCommitHash() {
    try {
        return grgit.head()?.abbreviatedId
    } catch (Exception e) {
        return null
    }
}
