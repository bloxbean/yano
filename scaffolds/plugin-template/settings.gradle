rootProject.name = 'appchain-plugin'

// Repository verification can compile this standalone template against the
// current Yano checkout without publishing provisional artifacts first.
def yanoSource = providers.gradleProperty('yanoSource')
if (yanoSource.present) {
    includeBuild(file(yanoSource.get())) {
        dependencySubstitution {
            substitute module('com.bloxbean.cardano:yano-core-api') using project(':core-api')
            substitute module('com.bloxbean.cardano:yano-runtime') using project(':runtime')
        }
    }
}
