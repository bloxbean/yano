// Standalone Gradle project template for a custom Yano app-chain state-machine
// plugin (ADR app-layer/006 E1.5). Build a jar, drop it on the node's
// yaci.plugins.directory, and select it via yano.app-chain.state-machine.
plugins {
    id 'java'
}

group = 'com.example'
version = '0.1.0'

def yanoVersion = providers.gradleProperty('yanoVersion')
        .orElse('0.1.0-pre9')
        .get()

repositories {
    mavenLocal()   // resolves locally-published yano artifacts
    mavenCentral()
}

// This source set is deliberately isolated from sourceSets.main.output. Its
// process-level probe must load the provider from the built plugin JAR through
// Yano's real directory catalog, not accidentally from the parent classpath.
sourceSets {
    catalogProbe {
        java.srcDir 'src/catalogProbe/java'
    }
}

dependencies {
    // The node provides the public SPI at runtime — never package it in the plugin.
    compileOnly "com.bloxbean.cardano:yano-core-api:${yanoVersion}"

    testImplementation "com.bloxbean.cardano:yano-core-api:${yanoVersion}"
    // StateMachineConformance is a runtime test utility, not part of core-api.
    testImplementation "com.bloxbean.cardano:yano-runtime:${yanoVersion}"
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.assertj:assertj-core:3.25.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    catalogProbeImplementation "com.bloxbean.cardano:yano-runtime:${yanoVersion}"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

test {
    useJUnitPlatform()
}

// Produces build/libs/appchain-plugin-<version>.jar — copy it to the node's
// plugins directory. If your plugin has extra runtime dependencies, produce
// one shaded artifact without Yano API classes; adjacent dependency JARs are
// not one manifested/digested bundle in catalog v1.
jar {
    archiveBaseName = 'appchain-plugin'
}

tasks.register('verifyPluginJar') {
    group = 'verification'
    description = 'Verifies the standalone plugin jar discovery metadata and API isolation.'
    dependsOn tasks.named('jar')
    inputs.file(tasks.named('jar').flatMap { it.archiveFile })

    doLast {
        def archive = tasks.named('jar').get().archiveFile.get().asFile
        def contents = zipTree(archive)
        def servicePath = 'META-INF/services/' +
                'com.bloxbean.cardano.yano.api.appchain.AppStateMachineProvider'
        def manifestPath = 'META-INF/yano/plugins/com.example.appchain.counter.json'
        [servicePath, manifestPath].each { requiredPath ->
            if (contents.matching { include requiredPath }.isEmpty()) {
                throw new GradleException("Plugin jar is missing ${requiredPath}")
            }
        }
        def expectedProvider = 'com.example.appchain.CounterStateMachineProvider'
        def serviceProviders = contents.matching { include servicePath }.singleFile
                .readLines('UTF-8')
                .collect { it.trim() }
                .findAll { !it.isEmpty() && !it.startsWith('#') }
        if (serviceProviders != [expectedProvider]) {
            throw new GradleException(
                    "Plugin service entry must contain exactly ${expectedProvider}")
        }
        def manifest = new groovy.json.JsonSlurper().parse(
                contents.matching { include manifestPath }.singleFile)
        def contributions = manifest.contributions.findAll { contribution ->
            contribution.kind == 'app-state-machine' &&
                    contribution.name == 'counter' &&
                    contribution.provider == expectedProvider
        }
        if (manifest.id != 'com.example.appchain.counter' || contributions.size() != 1) {
            throw new GradleException('Plugin manifest identity/provider declaration is invalid')
        }
        if (manifest.version != project.version.toString()) {
            throw new GradleException(
                    "Plugin manifest version ${manifest.version} must match project version "
                            + project.version)
        }
        if (!contents.matching { include 'com/bloxbean/cardano/yano/**' }.isEmpty()) {
            throw new GradleException('Plugin jar must not package Yano API/runtime classes')
        }
    }
}

tasks.register('verifyPluginCatalogLaunch', JavaExec) {
    group = 'verification'
    description = 'Loads the built plugin JAR through the production Yano catalog.'
    dependsOn tasks.named('jar'), tasks.named('catalogProbeClasses')
    classpath = sourceSets.catalogProbe.runtimeClasspath
    mainClass = 'com.example.catalog.PluginCatalogLaunchProbe'
    inputs.file(tasks.named('jar').flatMap { it.archiveFile })

    doFirst {
        args = [
                tasks.named('jar').get().archiveFile.get().asFile.absolutePath,
                project.version.toString()
        ]
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyPluginJar')
    dependsOn tasks.named('verifyPluginCatalogLaunch')
}
